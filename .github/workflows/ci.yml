name: CI - 테스트 & 린트

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: 린트 (Ruff)
        run: ruff check src/ web_server.py --select E,F,W --ignore E501

      - name: 테스트
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_full_integration.py \
            --ignore=tests/test_performance.py \
            -x

      - name: 커버리지 리포트
        if: matrix.python-version == '3.11'
        run: |
          pip install pytest-cov
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_full_integration.py \
            --ignore=tests/test_performance.py \
            --cov=src --cov=web_server --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Docker 빌드 테스트
        run: docker build -t bonded-chatbot:test .

      - name: 컨테이너 헬스 체크
        run: |
          docker run -d --name test-chatbot -p 8080:8080 bonded-chatbot:test
          sleep 10
          curl -f http://localhost:8080/health || exit 1
          docker stop test-chatbot
