name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 데이터 정합성 검증
        run: |
          python -c "from src.data_validator import validate_all; result = validate_all(); assert result['valid'], f'데이터 검증 실패: {result}'"

      - name: 테스트 실행
        run: |
          pytest tests/ -v --tb=short
