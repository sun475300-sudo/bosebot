<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 보세전시장 챗봇 관리자</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a2332;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            background: #243447;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            font-size: 1.4rem;
            color: #a8d0f0;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            font-size: 0.85rem;
            color: #8899aa;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #8899aa;
            margin-bottom: 0.4rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #1a2332;
            border: 1px solid #3a4a5c;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #a8d0f0;
        }
        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background: #1a3a5c;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .login-btn:hover {
            background: #245280;
        }
        .login-btn:disabled {
            background: #2a3a4a;
            cursor: not-allowed;
        }
        .error-message {
            background: #3d2020;
            color: #e74c3c;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #8899aa;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .back-link:hover {
            color: #a8d0f0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>보세전시장 챗봇 관리자</h1>
            <p>관리자 대시보드에 접근하려면 로그인하세요.</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">사용자명</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">로그인</button>
        </form>

        <a href="/" class="back-link">챗봇으로 돌아가기</a>
    </div>

    <script>
        // If already logged in with a valid token, redirect to admin
        const existingToken = localStorage.getItem("admin_token");
        if (existingToken) {
            fetch("/api/auth/me", {
                headers: { "Authorization": "Bearer " + existingToken }
            }).then(res => {
                if (res.ok) {
                    window.location.href = "/admin";
                }
            }).catch(() => {});
        }

        async function handleLogin(e) {
            e.preventDefault();
            const errorEl = document.getElementById("errorMessage");
            const btn = document.getElementById("loginBtn");
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            errorEl.style.display = "none";
            btn.disabled = true;
            btn.textContent = "로그인 중...";

            try {
                const res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem("admin_token", data.token);
                    window.location.href = "/admin";
                } else {
                    errorEl.textContent = data.error || "로그인에 실패했습니다.";
                    errorEl.style.display = "block";
                }
            } catch (err) {
                errorEl.textContent = "서버에 연결할 수 없습니다.";
                errorEl.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "로그인";
            }
        }
    </script>
</body>
</html>
