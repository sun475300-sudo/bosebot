<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 보세전시장 챗봇 관리자</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        :root {
            --bg: #FAFAF7; --panel: #FFFFFF;
            --fg: #1F2328; --fg-strong: #0B1221; --fg-muted: #57606A;
            --border: #D0D7DE; --border-subtle: #E5E7EB;
            --accent: #0969DA; --accent-strong: #0550AE;
            --accent-bg: rgba(9,105,218,0.08);
            --danger: #CF222E; --danger-bg: rgba(207,34,46,0.08);
            --shadow: 0 1px 3px rgba(31,35,40,0.08), 0 8px 24px rgba(31,35,40,0.06);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0D1117; --panel: #161B22;
                --fg: #E6EDF3; --fg-strong: #F0F6FC; --fg-muted: #8B949E;
                --border: #30363D; --border-subtle: #21262D;
                --accent: #58A6FF; --accent-strong: #79B8FF;
                --accent-bg: rgba(88,166,255,0.12);
                --danger: #F85149; --danger-bg: rgba(248,81,73,0.10);
                --shadow: 0 1px 3px rgba(0,0,0,0.30), 0 8px 24px rgba(0,0,0,0.35);
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
            background: var(--bg); color: var(--fg);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; font-size: 16px; line-height: 1.65;
            -webkit-font-smoothing: antialiased; padding: 16px;
        }
        .login-container {
            background: var(--panel); border: 1px solid var(--border-subtle);
            border-radius: 14px; padding: 32px;
            width: 100%; max-width: 400px; box-shadow: var(--shadow);
        }
        .login-header { text-align: center; margin-bottom: 24px; }
        .login-header h1 {
            font-size: 20px; font-weight: 700; color: var(--fg-strong);
            margin-bottom: 6px; letter-spacing: -0.3px;
        }
        .login-header p { font-size: 13.5px; color: var(--fg-muted); }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 500;
            color: var(--fg-muted); margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 11px 14px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--fg); font-size: 15px;
            font-family: inherit; outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }
        .login-btn {
            width: 100%; padding: 12px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: background-color 0.15s; margin-top: 6px;
        }
        .login-btn:hover { background: var(--accent-strong); }
        .login-btn:disabled {
            background: var(--border); color: var(--fg-muted); cursor: not-allowed;
        }
        .error-message {
            background: var(--danger-bg); color: var(--danger);
            border: 1px solid rgba(207,34,46,0.25);
            padding: 9px 12px; border-radius: 8px;
            font-size: 13px; margin-bottom: 12px; display: none;
        }
        .back-link {
            display: block; text-align: center;
            margin-top: 16px; color: var(--fg-muted);
            font-size: 13px; text-decoration: none; transition: color 0.15s;
        }
        .back-link:hover { color: var(--accent); }
        *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>보세전시장 챗봇 관리자</h1>
            <p>관리자 대시보드에 접근하려면 로그인하세요.</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">사용자명</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">로그인</button>
        </form>

        <a href="/" class="back-link">챗봇으로 돌아가기</a>
    </div>

    <script>
        // If already logged in with a valid token, redirect to admin
        const existingToken = localStorage.getItem("admin_token");
        if (existingToken) {
            fetch("/api/auth/me", {
                headers: { "Authorization": "Bearer " + existingToken }
            }).then(res => {
                if (res.ok) {
                    window.location.href = "/admin";
                }
            }).catch(() => {});
        }

        async function handleLogin(e) {
            e.preventDefault();
            const errorEl = document.getElementById("errorMessage");
            const btn = document.getElementById("loginBtn");
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            errorEl.style.display = "none";
            btn.disabled = true;
            btn.textContent = "로그인 중...";

            try {
                const res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem("admin_token", data.token);
                    window.location.href = "/admin";
                } else {
                    errorEl.textContent = data.error || "로그인에 실패했습니다.";
                    errorEl.style.display = "block";
                }
            } catch (err) {
                errorEl.textContent = "서버에 연결할 수 없습니다.";
                errorEl.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "로그인";
            }
        }
    </script>
</body>
</html>
