<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/icon-192.svg">
<link rel="apple-touch-icon" href="/static/icon-192.svg">
<title>보세전시장 민원응대 챗봇</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 50%, #0d2137 100%);
    height: 100vh;
    display: flex;
    flex-direction: column;
    color: #e0e6ed;
  }

  /* 헤더 */
  header {
    background: rgba(15, 25, 40, 0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(100, 180, 255, 0.15);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 10;
  }
  header .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #2196F3, #00BCD4);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
    box-shadow: 0 2px 12px rgba(33, 150, 243, 0.3);
  }
  header h1 { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  header .badge {
    background: linear-gradient(135deg, #00BCD4, #26C6DA);
    font-size: 10px; font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    color: #fff;
    letter-spacing: 0.5px;
  }
  header .status {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #4CAF50;
  }
  header .status::before {
    content: '';
    width: 8px; height: 8px;
    background: #4CAF50;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .container {
    flex: 1;
    display: flex;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    overflow: hidden;
  }

  /* 사이드바 */
  .sidebar {
    width: 300px;
    background: rgba(15, 22, 35, 0.9);
    backdrop-filter: blur(10px);
    border-right: 1px solid rgba(100, 180, 255, 0.08);
    overflow-y: auto;
    padding: 0;
    display: none;
  }
  @media (min-width: 900px) { .sidebar { display: flex; flex-direction: column; } }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(100,180,255,0.2); border-radius: 4px; }
  .sidebar-header {
    padding: 18px 20px 14px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(100, 180, 255, 0.6);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    border-bottom: 1px solid rgba(100, 180, 255, 0.06);
    position: sticky; top: 0;
    background: rgba(15, 22, 35, 0.95);
    backdrop-filter: blur(10px);
    z-index: 1;
  }
  .sidebar-content { padding: 8px 0; flex: 1; overflow-y: auto; }
  .faq-item {
    padding: 12px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.2s ease;
    position: relative;
  }
  .faq-item:hover {
    background: rgba(33, 150, 243, 0.08);
    border-left-color: #2196F3;
  }
  .faq-item:active { background: rgba(33, 150, 243, 0.15); }
  .faq-item .cat-label {
    font-size: 10px;
    font-weight: 600;
    color: rgba(0, 188, 212, 0.8);
    display: inline-block;
    margin-bottom: 4px;
    padding: 1px 6px;
    background: rgba(0, 188, 212, 0.1);
    border-radius: 3px;
    letter-spacing: 0.3px;
  }
  .faq-item .faq-text {
    font-size: 13px;
    color: #b0bec5;
    line-height: 1.5;
  }

  /* 채팅 영역 */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: rgba(18, 28, 42, 0.5);
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(100,180,255,0.15); border-radius: 6px; }

  /* 메시지 버블 */
  .msg {
    max-width: 75%;
    padding: 16px 20px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.8;
    animation: fadeIn 0.3s ease;
    word-break: break-word;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.bot {
    align-self: flex-start;
    background: rgba(30, 45, 65, 0.9);
    border: 1px solid rgba(100, 180, 255, 0.1);
    border-bottom-left-radius: 4px;
    color: #d0d8e0;
  }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #1565C0, #1976D2);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 16px rgba(21, 101, 192, 0.3);
  }

  /* 구조화된 답변 스타일 */
  .msg.bot .section { margin-top: 12px; }
  .msg.bot .section-title {
    font-size: 12px;
    font-weight: 700;
    color: #4FC3F7;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .msg.bot .section-content {
    font-size: 13.5px;
    line-height: 1.8;
    color: #b0c4d8;
  }
  .msg.bot .legal-ref {
    color: #81D4FA;
    font-size: 12.5px;
  }
  .msg.bot .disclaimer {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(100, 180, 255, 0.08);
    font-size: 12px;
    color: #78909C;
    line-height: 1.6;
  }
  .msg.bot .escalation-badge {
    display: inline-block;
    background: rgba(255, 152, 0, 0.15);
    color: #FFB74D;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 8px;
  }

  .msg .meta {
    font-size: 11px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .msg.bot .meta { color: rgba(120, 144, 156, 0.8); }
  .msg.user .meta { color: rgba(255,255,255,0.5); }
  .meta .cat-tag {
    background: rgba(33, 150, 243, 0.15);
    color: #64B5F6;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
  }

  /* 타이핑 인디케이터 */
  .typing {
    align-self: flex-start;
    padding: 14px 20px;
    background: rgba(30, 45, 65, 0.9);
    border: 1px solid rgba(100, 180, 255, 0.1);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    display: none;
  }
  .typing.show { display: flex; align-items: center; gap: 4px; }
  .typing span {
    width: 7px; height: 7px;
    background: #4FC3F7;
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* 입력 영역 */
  .input-area {
    padding: 16px 24px;
    background: rgba(15, 22, 35, 0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(100, 180, 255, 0.08);
    display: flex;
    gap: 12px;
  }
  .input-area input {
    flex: 1;
    padding: 14px 20px;
    background: rgba(30, 45, 65, 0.8);
    border: 1px solid rgba(100, 180, 255, 0.12);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    color: #e0e6ed;
    outline: none;
    transition: all 0.2s;
  }
  .input-area input::placeholder { color: rgba(160, 180, 200, 0.4); }
  .input-area input:focus {
    border-color: rgba(33, 150, 243, 0.5);
    box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
  }
  .input-area button {
    padding: 14px 28px;
    background: linear-gradient(135deg, #1565C0, #1E88E5);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(21, 101, 192, 0.3);
  }
  .input-area button:hover {
    background: linear-gradient(135deg, #1976D2, #2196F3);
    box-shadow: 0 4px 16px rgba(21, 101, 192, 0.4);
    transform: translateY(-1px);
  }
  .input-area button:active { transform: translateY(0); }
  .input-area button:disabled {
    background: rgba(80, 100, 120, 0.5);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* 피드백 버튼 */
  .feedback-area {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(100, 180, 255, 0.06);
  }
  .feedback-btn {
    padding: 4px 12px;
    border-radius: 14px;
    border: 1px solid rgba(100, 180, 255, 0.2);
    background: rgba(30, 45, 65, 0.6);
    color: #90a4ae;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .feedback-btn:hover {
    background: rgba(33, 150, 243, 0.15);
    border-color: rgba(33, 150, 243, 0.4);
    color: #b0bec5;
  }
  .feedback-btn.selected {
    background: rgba(33, 150, 243, 0.2);
    border-color: #2196F3;
    color: #64B5F6;
    cursor: default;
  }
  .feedback-thanks {
    font-size: 12px;
    color: #4CAF50;
    padding: 4px 0;
  }

  /* 언어 선택 드롭다운 */
  .lang-selector {
    margin-left: 12px;
    padding: 4px 8px;
    background: rgba(30, 45, 65, 0.8);
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 6px;
    color: #b0c4d8;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: all 0.2s;
  }
  .lang-selector:hover {
    border-color: rgba(33, 150, 243, 0.5);
    color: #e0e6ed;
  }
  .lang-selector:focus {
    border-color: rgba(33, 150, 243, 0.5);
    box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
  }
  .lang-selector option {
    background: #1a2a3a;
    color: #e0e6ed;
  }

  /* 마이크 버튼 */
  #micBtn {
    padding: 14px;
    background: rgba(30, 45, 65, 0.8);
    border: 1px solid rgba(100, 180, 255, 0.12);
    border-radius: 12px;
    color: #b0c4d8;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
  }
  #micBtn:hover {
    background: rgba(33, 150, 243, 0.15);
    border-color: rgba(33, 150, 243, 0.4);
    color: #64B5F6;
  }
  #micBtn.listening {
    background: rgba(244, 67, 54, 0.2);
    border-color: rgba(244, 67, 54, 0.6);
    color: #f44336;
    animation: micPulse 1.5s infinite;
  }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(244, 67, 54, 0); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">B</div>
  <h1>보세전시장 민원응대 챗봇</h1>
  <span class="badge">v2.0</span>
  <div class="status">운영 중</div>
  <select id="langSelector" class="lang-selector" onchange="setLanguage(this.value)">
    <option value="ko">KO</option>
    <option value="en">EN</option>
    <option value="cn">CN</option>
    <option value="jp">JP</option>
  </select>
</header>

<div class="container">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">자주 묻는 질문</div>
    <div class="sidebar-content" id="sidebarContent"></div>
  </aside>
  <main class="chat-area">
    <div class="messages" id="messages">
      <div class="typing" id="typing">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="queryInput" placeholder="보세전시장에 대해 무엇이든 질문하세요..." autofocus>
      <button type="button" id="micBtn" onclick="toggleVoiceInput()" title="음성 입력">&#x1F3A4;</button>
      <button id="sendBtn" onclick="sendQuery()">전송</button>
    </div>
  </main>
</div>

<script>
/* --- Service Worker 등록 (PWA) --- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}

const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const queryInput = document.getElementById('queryInput');
const sendBtn = document.getElementById('sendBtn');
const CATEGORY_NAMES = {};

/* --- 다국어 지원 --- */
let currentLang = 'ko';

function setLanguage(lang) {
  currentLang = lang;
  document.getElementById('langSelector').value = lang;
}

/* --- 음성 입력 (Web Speech API) --- */
let recognition = null;
let isListening = false;
const micBtn = document.getElementById('micBtn');

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  micBtn.style.display = 'flex';
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    queryInput.value = transcript;
    queryInput.focus();
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
  };

  recognition.onerror = (event) => {
    isListening = false;
    micBtn.classList.remove('listening');
    if (event.error !== 'no-speech') {
      console.log('Speech recognition error:', event.error);
    }
  };
}

function toggleVoiceInput() {
  if (!recognition) return;
  if (isListening) {
    recognition.stop();
    isListening = false;
    micBtn.classList.remove('listening');
  } else {
    // 언어에 따라 음성 인식 언어 설정
    const langMap = { ko: 'ko-KR', en: 'en-US', cn: 'zh-CN', jp: 'ja-JP' };
    recognition.lang = langMap[currentLang] || 'ko-KR';
    recognition.start();
    isListening = true;
    micBtn.classList.add('listening');
  }
}
let msgCounter = 0;

async function init() {
  try {
    const configRes = await fetch('/api/config');
    const config = await configRes.json();
    config.categories.forEach(c => { CATEGORY_NAMES[c.code] = c.name; });
    addBotMessage(config.persona, null, false, true);

    const faqRes = await fetch('/api/faq');
    const faqData = await faqRes.json();
    renderSidebar(faqData.items);
  } catch (e) {
    addBotMessage('챗봇 초기화 중 오류가 발생했습니다. 페이지를 새로고침 해주세요.');
  }
}

function renderSidebar(items) {
  const el = document.getElementById('sidebarContent');
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });
  let html = '';
  for (const [cat, faqs] of Object.entries(grouped)) {
    faqs.forEach(faq => {
      const catName = CATEGORY_NAMES[cat] || cat;
      html += `<div class="faq-item" onclick="askFaq('${faq.question.replace(/'/g, "\\'")}')">
        <span class="cat-label">${catName}</span>
        <div class="faq-text">${faq.question}</div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

function askFaq(question) {
  queryInput.value = question;
  sendQuery();
}

async function sendQuery() {
  const query = queryInput.value.trim();
  if (!query) return;
  addUserMessage(query);
  queryInput.value = '';
  sendBtn.disabled = true;
  typingEl.classList.add('show');
  scrollToBottom();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, lang: currentLang }),
    });
    const data = await res.json();
    if (data.error) {
      addBotMessage(data.error);
    } else {
      const catName = CATEGORY_NAMES[data.category] || data.category;
      addBotMessage(data.answer, catName, data.is_escalation);
    }
  } catch (e) {
    addBotMessage('서버 연결 오류가 발생했습니다. 다시 시도해 주세요.');
  } finally {
    typingEl.classList.remove('show');
    sendBtn.disabled = false;
    queryInput.focus();
  }
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(content);
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  div.appendChild(meta);
  messagesEl.insertBefore(div, typingEl);
  scrollToBottom();
}

function addBotMessage(text, category, isEscalation, isWelcome) {
  const div = document.createElement('div');
  div.className = 'msg bot';

  if (isWelcome) {
    div.innerHTML = `<div style="font-size:14px;line-height:1.8">${escapeHtml(text)}</div>`;
  } else {
    div.innerHTML = formatBotAnswer(text);
  }

  if (isEscalation) {
    const badge = document.createElement('div');
    badge.className = 'escalation-badge';
    badge.textContent = '상담 연결 권고';
    div.appendChild(badge);
  }

  const meta = document.createElement('div');
  meta.className = 'meta';
  let metaHTML = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  if (category) metaHTML += ` <span class="cat-tag">${category}</span>`;
  meta.innerHTML = metaHTML;
  div.appendChild(meta);

  if (!isWelcome) {
    const queryId = 'msg_' + Date.now() + '_' + (++msgCounter);
    const fbArea = document.createElement('div');
    fbArea.className = 'feedback-area';
    fbArea.innerHTML =
      `<button class="feedback-btn" onclick="sendFeedback('${queryId}','helpful',this)">유용해요</button>` +
      `<button class="feedback-btn" onclick="sendFeedback('${queryId}','unhelpful',this)">아쉬워요</button>`;
    div.appendChild(fbArea);
  }

  messagesEl.insertBefore(div, typingEl);
  scrollToBottom();
}

function formatBotAnswer(text) {
  const sections = text.split('\n\n');
  let html = '';
  for (const section of sections) {
    const trimmed = section.trim();
    if (!trimmed) continue;

    if (trimmed.startsWith('문의하신 내용은')) {
      html += `<div style="font-size:13px;color:#78909C;margin-bottom:4px">${escapeHtml(trimmed)}</div>`;
    } else if (trimmed.startsWith('결론:')) {
      const content = trimmed.replace('결론:', '').trim();
      html += `<div class="section"><div class="section-title">결론</div><div class="section-content" style="color:#E0E0E0;font-weight:500">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('설명:')) {
      const content = trimmed.replace('설명:', '').trim();
      html += `<div class="section"><div class="section-title">설명</div><div class="section-content">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('민원인이 확인할 사항:')) {
      const content = trimmed.replace('민원인이 확인할 사항:', '').trim();
      html += `<div class="section"><div class="section-title">확인 사항</div><div class="section-content">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('근거:')) {
      const content = trimmed.replace('근거:', '').trim();
      html += `<div class="section"><div class="section-title">법적 근거</div><div class="legal-ref">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('추가 안내:')) {
      const content = trimmed.replace('추가 안내:', '').trim();
      html += `<div class="section"><div class="section-title" style="color:#FFB74D">추가 안내</div><div class="section-content" style="color:#FFCC80">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('안내:')) {
      const content = trimmed.replace('안내:', '').trim();
      html += `<div class="disclaimer">${escapeHtml(content)}</div>`;
    } else {
      html += `<div class="section"><div class="section-content">${escapeHtml(trimmed)}</div></div>`;
    }
  }
  return html || escapeHtml(text);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g, '<br>');
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendFeedback(queryId, rating, btn) {
  const area = btn.parentElement;
  area.querySelectorAll('.feedback-btn').forEach(b => { b.disabled = true; });
  btn.classList.add('selected');
  try {
    await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query_id: queryId, rating: rating }),
    });
  } catch (e) { /* 무시 */ }
  area.innerHTML = '<div class="feedback-thanks">감사합니다</div>';
}

queryInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});

init();
</script>
