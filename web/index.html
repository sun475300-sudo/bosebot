<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/icon-192.svg">
<link rel="apple-touch-icon" href="/static/icon-192.svg">
<title>보세전시장 민원응대 챗봇 Premium</title>
<style>
  /* ──────────────────────────────────────────────────────────────
     Typography — Pretendard (한글 가독성 최적) + Inter + Noto Sans KR fallback
     ────────────────────────────────────────────────────────────── */
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  /* ──────────────────────────────────────────────────────────────
     Design Tokens — color / space / shadow / radius
     dark default · [data-theme="light"] override · prefers-color-scheme honoured
     ────────────────────────────────────────────────────────────── */
  :root {
    /* Color — Brand */
    --color-primary: #0084ff;
    --color-primary-strong: #0056e0;
    --color-secondary: #00d2ff;
    --color-accent: #4FC3F7;
    --color-success: #4CAF50;
    --color-warning: #FFB74D;
    --color-error: #F44336;
    --color-info: #64B5F6;

    /* Color — Surface (dark default) */
    --color-bg: #0a0f18;
    --bg-gradient: linear-gradient(135deg, #0a0f18 0%, #111d2b 50%, #081624 100%);
    --color-surface: rgba(20, 30, 45, 0.7);
    --color-surface-elevated: rgba(30, 48, 68, 0.85);
    --color-surface-input: rgba(255, 255, 255, 0.05);
    --color-muted: rgba(255, 255, 255, 0.06);
    --color-border: rgba(255, 255, 255, 0.08);
    --color-border-strong: rgba(100, 180, 255, 0.2);

    /* Color — Text */
    --color-text: #f0f4f8;
    --color-text-muted: #a0aec0;
    --color-text-faint: #78909C;
    --color-text-on-primary: #ffffff;

    /* Legacy aliases (preserve existing CSS) */
    --accent-primary: var(--color-primary);
    --accent-secondary: var(--color-secondary);
    --glass-bg: var(--color-surface);
    --glass-border: var(--color-border);
    --bot-msg-bg: var(--color-surface-elevated);
    --user-msg-gradient: linear-gradient(135deg, var(--color-primary), var(--color-primary-strong));
    --text-primary: var(--color-text);
    --text-secondary: var(--color-text-muted);

    /* Spacing — 8px grid (--space-N = N × 4px so space-2=8, space-4=16, space-6=24, space-8=32) */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-12: 48px;

    /* Radius */
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --radius-pill: 999px;

    /* Shadow */
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.18);
    --shadow-md: 0 8px 20px rgba(0,0,0,0.28);
    --shadow-lg: 0 18px 40px rgba(0,0,0,0.38);
    --shadow-focus: 0 0 0 3px rgba(0, 132, 255, 0.35);

    /* Typography — font stack with Pretendard first for Korean */
    --font-sans: 'Pretendard Variable', 'Pretendard', 'Inter', 'Outfit', 'Noto Sans KR',
                 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

    /* Motion */
    --duration-fast: 0.15s;
    --duration-base: 0.25s;
    --easing-standard: cubic-bezier(0.4, 0, 0.2, 1);
    --easing-emphasized: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  /* Light theme via [data-theme] (preferred). Existing body.light still supported. */
  [data-theme="light"], body.light {
    --color-bg: #f5f7fa;
    --bg-gradient: linear-gradient(135deg, #e8eef5 0%, #f5f7fa 50%, #e3ecf5 100%);
    --color-surface: rgba(255, 255, 255, 0.92);
    --color-surface-elevated: #ffffff;
    --color-surface-input: #f0f2f5;
    --color-muted: rgba(0, 0, 0, 0.04);
    --color-border: rgba(0, 0, 0, 0.08);
    --color-border-strong: rgba(33, 150, 243, 0.2);
    --color-text: #1a2a3a;
    --color-text-muted: #555;
    --color-text-faint: #888;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 8px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 18px 40px rgba(0,0,0,0.12);
    --shadow-focus: 0 0 0 3px rgba(0, 132, 255, 0.25);
  }

  /* Auto dark/light per OS preference (only if user has not explicitly chosen) */
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]):not([data-theme="light"]) {
      /* Defer to body.light/data-theme overrides — kept for users who want auto. */
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; }
  body {
    font-family: var(--font-sans);
    font-feature-settings: "ss01", "ss02";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    background: var(--bg-gradient);
    height: 100vh;
    display: flex;
    flex-direction: column;
    color: var(--text-primary);
    overflow: hidden;
    /* Korean weight refinement: 400/500/600/700 maps to Pretendard variable */
    font-weight: 400;
    line-height: 1.6;
  }

  /* Korean-specific line-height + letter-spacing tweaks */
  :is(h1, h2, h3, p, .msg, .faq-item, .section-content) {
    word-break: keep-all;
    overflow-wrap: anywhere;
    letter-spacing: -0.005em;
  }

  /* Reduced motion — disable transitions/animations for users who prefer it */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
    .typing-cursor { animation: none !important; }
  }

  /* 헤더 고도화 */
  header {
    background: rgba(10, 15, 24, 0.85);
    backdrop-filter: blur(25px);
    border-bottom: 1px solid var(--glass-border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 100;
  }
  header .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: #fff;
    box-shadow: 0 4px 15px rgba(0, 132, 255, 0.4);
  }
  header h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  header .badge {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 11px; font-weight: 600;
    padding: 2px 10px;
    border-radius: 20px;
    color: var(--accent-secondary);
    letter-spacing: 0.5px;
  }

  .container {
    flex: 1;
    display: flex;
    overflow: hidden;
    background: radial-gradient(circle at top right, rgba(0, 132, 255, 0.05), transparent 40%);
  }

  /* 사이드바 글래스모피즘 */
  .sidebar {
    width: 360px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border-right: 1px solid var(--glass-border);
    display: none;
  }
  @media (min-width: 900px) { .sidebar { display: flex; flex-direction: column; } }
  
  .sidebar-header {
    padding: 24px 20px 16px;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-secondary);
    text-transform: uppercase;
    letter-spacing: 2px;
    background: rgba(10, 15, 24, 0.4);
  }

  /* 채팅 애니메이션 */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    scroll-behavior: smooth;
  }
  .msg {
    max-width: 80%;
    padding: 20px 28px;
    border-radius: 24px;
    font-size: 15px;
    line-height: 1.8;
    margin-bottom: 20px;
    position: relative;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: slideUp 0.5s ease backwards;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg.bot {
    align-self: flex-start;
    background: var(--bot-msg-bg);
    border: 1px solid var(--glass-border);
    border-bottom-left-radius: 4px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-msg-gradient);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 15px 35px rgba(0, 132, 255, 0.25);
  }

  /* 입력창 프리미엄 */
  .input-area {
    padding: 24px 40px;
    background: rgba(10, 15, 24, 0.9);
    backdrop-filter: blur(30px);
    border-top: 1px solid var(--glass-border);
  }
  .input-area input {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 16px 24px;
    font-size: 15px;
    color: #fff;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .input-area input:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 20px rgba(0, 132, 255, 0.15);
  }
  .input-area button {
    background: var(--user-msg-gradient);
    border-radius: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .input-area button:hover {
    background: linear-gradient(135deg, #1976D2, #2196F3);
    box-shadow: 0 4px 16px rgba(21, 101, 192, 0.4);
    transform: translateY(-1px);
  }
  .input-area button:active { transform: translateY(0); }
  .input-area button:disabled {
    background: rgba(80, 100, 120, 0.5);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* 피드백 버튼 */
  .feedback-area {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(100, 180, 255, 0.06);
  }
  .feedback-btn {
    padding: 4px 12px;
    border-radius: 14px;
    border: 1px solid rgba(100, 180, 255, 0.2);
    background: rgba(30, 45, 65, 0.6);
    color: #90a4ae;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .feedback-btn:hover {
    background: rgba(33, 150, 243, 0.15);
    border-color: rgba(33, 150, 243, 0.4);
    color: #b0bec5;
  }
  .feedback-btn.selected {
    background: rgba(33, 150, 243, 0.2);
    border-color: #2196F3;
    color: #64B5F6;
    cursor: default;
  }
  .feedback-thanks {
    font-size: 12px;
    color: #4CAF50;
    padding: 4px 0;
  }

  /* 내보내기 버튼 및 드롭다운 */
  .export-wrapper {
    position: relative;
    margin-left: 8px;
  }
  .export-btn {
    padding: 6px 10px;
    background: rgba(30, 45, 65, 0.8);
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 6px;
    color: #b0c4d8;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .export-btn:hover {
    border-color: rgba(33, 150, 243, 0.5);
    color: #e0e6ed;
    background: rgba(33, 150, 243, 0.15);
  }
  .export-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 6px;
    background: rgba(20, 32, 50, 0.98);
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 8px;
    overflow: hidden;
    min-width: 140px;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .export-dropdown.show { display: block; }
  .export-dropdown button {
    display: block;
    width: 100%;
    padding: 10px 16px;
    background: none;
    border: none;
    color: #b0c4d8;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
  }
  .export-dropdown button:hover {
    background: rgba(33, 150, 243, 0.15);
    color: #e0e6ed;
  }
  .export-dropdown button + button {
    border-top: 1px solid rgba(100, 180, 255, 0.08);
  }

  /* 언어 선택 드롭다운 */
  .lang-selector {
    margin-left: 12px;
    padding: 4px 8px;
    background: rgba(30, 45, 65, 0.8);
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 6px;
    color: #b0c4d8;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: all 0.2s;
  }
  .lang-selector:hover {
    border-color: rgba(33, 150, 243, 0.5);
    color: #e0e6ed;
  }
  .lang-selector:focus {
    border-color: rgba(33, 150, 243, 0.5);
    box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
  }
  .lang-selector option {
    background: #1a2a3a;
    color: #e0e6ed;
  }

  /* 마이크 버튼 */
  #micBtn {
    padding: 14px;
    background: rgba(30, 45, 65, 0.8);
    border: 1px solid rgba(100, 180, 255, 0.12);
    border-radius: 12px;
    color: #b0c4d8;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
  }
  #micBtn:hover {
    background: rgba(33, 150, 243, 0.15);
    border-color: rgba(33, 150, 243, 0.4);
    color: #64B5F6;
  }
  #micBtn.listening {
    background: rgba(244, 67, 54, 0.2);
    border-color: rgba(244, 67, 54, 0.6);
    color: #f44336;
    animation: micPulse 1.5s infinite;
  }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(244, 67, 54, 0); }
  }

  /* 자동완성 드롭다운 */
  .autocomplete-wrapper {
    position: relative;
    flex: 1;
  }
  .autocomplete-wrapper input {
    width: 100%;
  }
  #autocompleteDropdown {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 0;
    margin-bottom: 6px;
    background: rgba(20, 32, 50, 0.98);
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 10px;
    overflow: hidden;
    z-index: 200;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.4);
  }
  #autocompleteDropdown.show { display: block; }
  .ac-item {
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(100, 180, 255, 0.06);
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.active {
    background: rgba(33, 150, 243, 0.15);
  }
  .ac-item .ac-cat {
    font-size: 10px;
    font-weight: 600;
    color: rgba(0, 188, 212, 0.8);
    margin-bottom: 2px;
    display: inline-block;
    padding: 1px 6px;
    background: rgba(0, 188, 212, 0.1);
    border-radius: 3px;
  }
  .ac-item .ac-question {
    font-size: 13px;
    color: #b0c4d8;
    line-height: 1.4;
  }

  /* 키워드 하이라이트 */
  .msg.bot mark {
    background: rgba(255, 213, 79, 0.25);
    color: inherit;
    padding: 0 2px;
    border-radius: 2px;
  }

  /* 답변 접기/펼치기 */
  .collapse-toggle {
    display: inline-block;
    margin-top: 8px;
    padding: 3px 10px;
    font-size: 11px;
    color: #64B5F6;
    background: rgba(33, 150, 243, 0.1);
    border: 1px solid rgba(33, 150, 243, 0.2);
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .collapse-toggle:hover { background: rgba(33, 150, 243, 0.2); }
  .msg.bot .collapsible { display: none; }
  .msg.bot.expanded .collapsible { display: block; }

  /* 타이핑 커서 */
  .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: #4FC3F7;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.7s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* 테마 토글 버튼 */
  .theme-toggle {
    padding: 6px 10px;
    background: rgba(30, 45, 65, 0.8);
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 6px;
    color: #b0c4d8;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
    margin-left: 8px;
  }
  .theme-toggle:hover { border-color: rgba(33, 150, 243, 0.5); color: #e0e6ed; }

  /* 라이트 테마 */
  body.light {
    background: linear-gradient(135deg, #e8eef5 0%, #f5f7fa 50%, #e3ecf5 100%);
    color: #333;
  }
  body.light header {
    background: rgba(255, 255, 255, 0.95);
    border-bottom-color: rgba(0, 0, 0, 0.1);
  }
  body.light header h1 { color: #1a2a3a; }
  body.light header .status { color: #2E7D32; }
  body.light .sidebar {
    background: rgba(255, 255, 255, 0.92);
    border-right-color: rgba(0, 0, 0, 0.08);
  }
  body.light .sidebar-header { color: #666; }
  body.light .faq-item .faq-text { color: #555; }
  body.light .faq-item:hover { background: rgba(33, 150, 243, 0.06); }
  body.light .chat-area { background: rgba(245, 247, 250, 0.6); }
  body.light .msg.bot {
    background: #fff;
    border-color: rgba(0, 0, 0, 0.08);
    color: #444;
  }
  body.light .msg.bot .section-content { color: #555; }
  body.light .msg.bot .section-title { color: #1565C0; }
  body.light .msg.bot .legal-ref { color: #1976D2; }
  body.light .msg.bot .disclaimer { color: #888; border-top-color: rgba(0,0,0,0.06); }
  body.light .msg.bot .meta { color: #999; }
  body.light .input-area {
    background: rgba(255, 255, 255, 0.95);
    border-top-color: rgba(0, 0, 0, 0.08);
  }
  body.light .input-area input {
    background: #f0f2f5;
    border-color: rgba(0, 0, 0, 0.1);
    color: #333;
  }
  body.light .input-area input::placeholder { color: rgba(0, 0, 0, 0.35); }
  body.light .feedback-btn {
    background: rgba(240, 242, 245, 0.8);
    border-color: rgba(0, 0, 0, 0.1);
    color: #666;
  }
  body.light .export-btn, body.light .theme-toggle, body.light #micBtn {
    background: rgba(240, 242, 245, 0.8);
    border-color: rgba(0, 0, 0, 0.1);
    color: #555;
  }
  body.light .lang-selector {
    background: rgba(240, 242, 245, 0.8);
    border-color: rgba(0, 0, 0, 0.1);
    color: #555;
  }
  body.light .lang-selector option { background: #fff; color: #333; }
  body.light .export-dropdown, body.light #autocompleteDropdown {
    background: rgba(255, 255, 255, 0.98);
    border-color: rgba(0, 0, 0, 0.1);
  }
  body.light .export-dropdown button, body.light .ac-item .ac-question { color: #555; }
  body.light .ac-item:hover, body.light .ac-item.active { background: rgba(33, 150, 243, 0.08); }
  body.light .collapse-toggle { color: #1565C0; background: rgba(33,150,243,0.08); border-color: rgba(33,150,243,0.15); }
  body.light .typing { background: #fff; border-color: rgba(0,0,0,0.08); }
  body.light .msg.bot mark { background: rgba(255, 213, 79, 0.4); }

  /* 모바일 햄버거 */
  .hamburger {
    display: none;
    padding: 6px 10px;
    background: rgba(30, 45, 65, 0.8);
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 6px;
    color: #b0c4d8;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    margin-right: 8px;
  }
  body.light .hamburger { background: rgba(240,242,245,0.8); border-color: rgba(0,0,0,0.1); color: #555; }

  /* 모바일 반응형 */
  @media (max-width: 899px) {
    .hamburger { display: flex; align-items: center; justify-content: center; }
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      z-index: 1000;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }
    .sidebar.mobile-open {
      display: flex !important;
      flex-direction: column;
      transform: translateX(0);
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }
    .sidebar-overlay.show { display: block; }
    header h1 { font-size: 14px; }
    header .badge { display: none; }
    .msg { max-width: 90%; }
    .messages { padding: 16px; }
    .input-area { padding: 10px 12px; gap: 8px; }
    .input-area input { padding: 12px 14px; font-size: 14px; }
    .input-area button { padding: 12px 18px; font-size: 13px; }
  }
  @media (max-width: 400px) {
    header { padding: 10px 12px; gap: 8px; }
    header h1 { font-size: 13px; }
    .export-wrapper, .lang-selector { margin-left: 4px; }
    .export-btn, .theme-toggle { padding: 5px 8px; font-size: 13px; }
  }

  /* --- WCAG 2.1 AA Accessibility --- */

  /* Visually hidden class for screen-reader-only text */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* Focus-visible outlines for keyboard navigation (dark theme) */
  *:focus-visible {
    outline: 2px solid #64B5F6;
    outline-offset: 2px;
  }
  body.light *:focus-visible {
    outline: 2px solid #1565C0;
    outline-offset: 2px;
  }

  /* Focusable FAQ items */
  .faq-item:focus-visible {
    background: rgba(33, 150, 243, 0.12);
    border-left-color: #2196F3;
    outline: 2px solid #64B5F6;
    outline-offset: -2px;
  }
  body.light .faq-item:focus-visible {
    background: rgba(33, 150, 243, 0.1);
    outline-color: #1565C0;
  }

  /* Improved contrast for light theme text */
  body.light .faq-item .faq-text { color: #333; }
  body.light .msg.bot { color: #333; }
  body.light .msg.bot .section-content { color: #444; }
  body.light .msg.bot .disclaimer { color: #555; }
  body.light .msg.bot .meta { color: #666; }
  body.light .input-area input::placeholder { color: rgba(0, 0, 0, 0.5); }
  body.light .sidebar-header { color: #444; }
  body.light .feedback-btn { color: #444; }
  body.light .export-dropdown button, body.light .ac-item .ac-question { color: #333; }

  /* Ensure skip-link for keyboard users */
  .skip-link {
    position: absolute;
    top: -100%;
    left: 0;
    padding: 12px 24px;
    background: #1565C0;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    z-index: 10000;
    border-radius: 0 0 8px 0;
    text-decoration: none;
  }
  .skip-link:focus {
    top: 0;
  }

  /* ════════════════════════════════════════════════════════════════
     Polish Layer (PR: ui-polish)
     Token-driven refinements layered on top of legacy styles.
     ════════════════════════════════════════════════════════════════ */

  /* — Avatar on bot messages (left side) — */
  .msg.bot { padding-left: var(--space-12) !important; position: relative; }
  .msg.bot::before {
    content: "🤵";
    position: absolute;
    left: var(--space-3);
    top: var(--space-3);
    width: 28px; height: 28px;
    border-radius: var(--radius-pill);
    background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    box-shadow: var(--shadow-sm);
  }

  /* — Hover timestamp on bubbles (relative time) — */
  .msg .meta { transition: opacity var(--duration-fast) var(--easing-standard); }
  @media (hover: hover) {
    .msg .meta { opacity: 0.55; }
    .msg:hover .meta, .msg:focus-within .meta { opacity: 1; }
  }

  /* — Header refinements — */
  header {
    box-shadow: var(--shadow-sm);
  }
  header h1 {
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  body.light header h1 { color: var(--color-text); }

  /* — Sidebar: search input on top — */
  .sidebar-search-wrapper {
    padding: var(--space-3) var(--space-4) var(--space-2);
    background: rgba(10, 15, 24, 0.4);
    border-bottom: 1px solid var(--color-border);
  }
  body.light .sidebar-search-wrapper { background: rgba(255,255,255,0.4); }
  .sidebar-search {
    width: 100%;
    padding: var(--space-2) var(--space-3);
    background: var(--color-surface-input);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text);
    font-size: 13px;
    font-family: inherit;
    transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
  }
  .sidebar-search::placeholder { color: var(--color-text-faint); }
  .sidebar-search:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: var(--shadow-focus);
  }

  /* Hide FAQ items that don't match search */
  .faq-item.search-hidden { display: none !important; }

  /* — Input area refinements: textarea auto-grow + char counter — */
  .input-area { position: relative; }
  .input-area textarea#queryInput {
    width: 100%;
    background: var(--color-surface-input);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-5);
    font-size: 15px;
    font-family: inherit;
    line-height: 1.5;
    color: var(--color-text);
    transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
    resize: none;
    min-height: 48px;
    max-height: 120px; /* ≈ 5 lines @ line-height 1.5 + padding */
    overflow-y: auto;
  }
  .input-area textarea#queryInput:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: var(--shadow-focus);
  }
  .input-area textarea#queryInput::placeholder { color: var(--color-text-faint); }

  .char-counter {
    position: absolute;
    right: var(--space-10);
    bottom: var(--space-2);
    font-size: 11px;
    color: var(--color-text-faint);
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }
  .char-counter.warn { color: var(--color-warning); }
  .char-counter.error { color: var(--color-error); }

  /* — Toast (transient error/info notification) — */
  .toast-container {
    position: fixed;
    top: var(--space-5);
    right: var(--space-5);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    pointer-events: none;
  }
  .toast {
    background: var(--color-surface-elevated);
    color: var(--color-text);
    border: 1px solid var(--color-border-strong);
    border-left: 4px solid var(--color-info);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    box-shadow: var(--shadow-md);
    min-width: 240px;
    max-width: 360px;
    font-size: 13px;
    pointer-events: auto;
    animation: toastIn var(--duration-base) var(--easing-emphasized);
  }
  .toast.error { border-left-color: var(--color-error); }
  .toast.success { border-left-color: var(--color-success); }
  .toast.warn { border-left-color: var(--color-warning); }
  @keyframes toastIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* — Empty state (when no messages and no typing) — */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--color-text-muted);
    padding: var(--space-12) var(--space-5);
    gap: var(--space-3);
  }
  .empty-state .empty-icon { font-size: 48px; opacity: 0.5; }
  .empty-state .empty-title { font-size: 16px; font-weight: 600; color: var(--color-text); }
  .empty-state .empty-body { font-size: 13px; line-height: 1.6; max-width: 360px; }

  /* — Loading spinner (alternative to typing dots) — */
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--color-border-strong);
    border-top-color: var(--color-primary);
    border-radius: var(--radius-pill);
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* — Stronger focus ring across all interactive elements — */
  button:focus-visible,
  input:focus-visible,
  textarea:focus-visible,
  select:focus-visible,
  [tabindex]:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
    box-shadow: var(--shadow-focus);
  }

  /* ────────────────────────────────────────────────────────────────
     Responsive 4-tier
     • ≥1024px : desktop (default — sidebar inline)
     • 768–1023 : tablet (sidebar inline, slightly narrower)
     • ≤767     : mobile (sidebar drawer, hamburger)
     • ≤480     : small mobile (compact paddings)
     ──────────────────────────────────────────────────────────────── */

  /* tablet 768–1023 */
  @media (min-width: 768px) and (max-width: 1023px) {
    .sidebar { width: 280px; display: flex !important; flex-direction: column; }
    .messages { padding: var(--space-5) var(--space-6); }
    .input-area { padding: var(--space-4) var(--space-5); }
  }

  /* mobile ≤767 — re-spec older 899px breakpoint to 767 */
  @media (max-width: 767px) {
    .hamburger { display: flex !important; align-items: center; justify-content: center; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 280px;
      z-index: 1000;
      transform: translateX(-100%);
      transition: transform var(--duration-base) var(--easing-standard);
      display: flex; flex-direction: column;
    }
    .sidebar.mobile-open { transform: translateX(0); }
    .sidebar-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
      z-index: 999;
      display: none;
    }
    .sidebar-overlay.show { display: block; }
    header h1 { font-size: 15px; }
    header .badge, header .status { display: none; }
    .msg { max-width: 92%; padding: var(--space-3) var(--space-4); font-size: 14px; }
    .messages { padding: var(--space-4); }
    .input-area { padding: var(--space-3) var(--space-3); gap: var(--space-2); }
    .input-area textarea#queryInput { padding: var(--space-3); font-size: 14px; min-height: 44px; }
    .input-area button { padding: var(--space-3) var(--space-4); font-size: 13px; }
    .char-counter { right: var(--space-8); font-size: 10px; }
  }

  /* small mobile ≤480 */
  @media (max-width: 480px) {
    header { padding: var(--space-2) var(--space-3); gap: var(--space-2); }
    header h1 { font-size: 13px; }
    header .logo { width: 32px; height: 32px; font-size: 16px; }
    .export-wrapper, .lang-selector, .theme-toggle { margin-left: var(--space-1); }
    .export-btn, .theme-toggle { padding: 5px 8px; font-size: 13px; }
    .messages { padding: var(--space-3); }
    .msg.bot { padding-left: var(--space-10) !important; }
    .msg.bot::before { left: var(--space-2); width: 24px; height: 24px; font-size: 12px; }
  }

  /* ── A11y: high-contrast mode ── */
  @media (prefers-contrast: more) {
    :root {
      --color-border: rgba(255,255,255,0.4);
      --color-border-strong: rgba(255,255,255,0.7);
    }
    .msg.bot { border-width: 2px; }
  }
</style>
</head>
<body>

<a href="#queryInput" class="skip-link">메인 콘텐츠로 건너뛰기</a>

<header role="banner">
  <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileSidebar()" aria-label="사이드바 메뉴 열기" aria-expanded="false" aria-controls="sidebar"><span class="sr-only">메뉴</span>&#x2630;</button>
  <div class="logo">B</div>
  <h1>보세전시장 민원응대 챗봇</h1>
  <span class="badge">v4.0.0</span>
  <div class="status">운영 중</div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="테마 전환" aria-label="테마 전환"><span class="sr-only">테마 전환</span>&#x263E;</button>
  <div class="export-wrapper">
    <button class="export-btn" id="exportBtn" onclick="toggleExportDropdown()" title="대화 내보내기" aria-label="대화 내보내기" aria-expanded="false" aria-haspopup="true" aria-controls="exportDropdown"><span class="sr-only">내보내기</span>&#x2B07;</button>
    <div class="export-dropdown" id="exportDropdown" role="menu" aria-label="내보내기 형식 선택">
      <button role="menuitem" onclick="exportConversation('text')">Text (.txt)</button>
      <button role="menuitem" onclick="exportConversation('json')">JSON (.json)</button>
      <button role="menuitem" onclick="exportConversation('csv')">CSV (.csv)</button>
      <button role="menuitem" onclick="exportConversation('html')">HTML (.html)</button>
    </div>
  </div>
  <select id="langSelector" class="lang-selector" onchange="setLanguage(this.value)" aria-label="언어 선택">
    <option value="ko">KO</option>
    <option value="en">EN</option>
    <option value="cn">CN</option>
    <option value="jp">JP</option>
  </select>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()" aria-hidden="true"></div>
<div class="toast-container" id="toastContainer" role="region" aria-live="polite" aria-label="알림"></div>
<div class="container">
  <aside class="sidebar" id="sidebar" role="complementary" aria-label="자주 묻는 질문">
    <div class="sidebar-search-wrapper">
      <label for="sidebarSearch" class="sr-only">FAQ 검색</label>
      <input
        type="search"
        id="sidebarSearch"
        class="sidebar-search"
        placeholder="🔍 FAQ 검색…"
        autocomplete="off"
        aria-label="FAQ 검색"
        aria-controls="sidebarContent">
    </div>
    <div class="sidebar-header">자주 묻는 질문</div>
    <nav class="sidebar-content" id="sidebarContent" aria-label="자주 묻는 질문 목록"></nav>
  </aside>
  <main class="chat-area" role="main" aria-label="채팅 영역">
    <div class="messages" id="messages" aria-live="polite" aria-relevant="additions" aria-label="대화 메시지">
      <div class="empty-state" id="emptyState" hidden>
        <div class="empty-icon" aria-hidden="true">💬</div>
        <div class="empty-title">무엇이든 물어보세요</div>
        <div class="empty-body">
          왼쪽 사이드바의 자주 묻는 질문을 클릭하거나, 아래 입력창에 직접 질문을 입력하세요.
          <br><kbd>/</kbd> 키로 빠르게 입력창에 포커스할 수 있습니다.
        </div>
      </div>
      <div class="typing" id="typing" role="status" aria-label="응답 작성 중">
        <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
        <span class="sr-only">응답을 작성하고 있습니다</span>
      </div>
    </div>
    <div class="input-area">
      <div class="autocomplete-wrapper">
        <label for="queryInput" class="sr-only">질문 입력</label>
        <textarea
          id="queryInput"
          placeholder="보세전시장에 대해 무엇이든 질문하세요…  ( / 키로 빠르게 포커스, Enter 전송, Shift+Enter 줄바꿈 )"
          autofocus
          autocomplete="off"
          rows="1"
          maxlength="1000"
          aria-label="질문 입력"
          aria-autocomplete="list"
          aria-controls="autocompleteDropdown"
          aria-describedby="charCounter"></textarea>
        <div id="autocompleteDropdown" role="listbox" aria-label="자동완성 제안"></div>
        <div id="charCounter" class="char-counter" aria-live="polite" aria-atomic="true">0 / 1000</div>
      </div>
      <button type="button" id="micBtn" onclick="toggleVoiceInput()" title="음성 입력" aria-label="음성 입력"><span class="sr-only">음성 입력</span>&#x1F3A4;</button>
      <button id="sendBtn" onclick="sendQuery()" aria-label="메시지 전송" disabled>전송</button>
    </div>
  </main>
</div>

<script>
/* --- Service Worker 등록 (PWA) --- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}

const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const queryInput = document.getElementById('queryInput');
const sendBtn = document.getElementById('sendBtn');
const CATEGORY_NAMES = {};

/* --- 다국어 지원 --- */
let currentLang = 'ko';

function setLanguage(lang) {
  currentLang = lang;
  document.getElementById('langSelector').value = lang;
}

/* --- 음성 입력 (Web Speech API) --- */
let recognition = null;
let isListening = false;
const micBtn = document.getElementById('micBtn');

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  micBtn.style.display = 'flex';
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    queryInput.value = transcript;
    queryInput.focus();
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
  };

  recognition.onerror = (event) => {
    isListening = false;
    micBtn.classList.remove('listening');
    if (event.error !== 'no-speech') {
      console.log('Speech recognition error:', event.error);
    }
  };
}

function toggleVoiceInput() {
  if (!recognition) return;
  if (isListening) {
    recognition.stop();
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.setAttribute('aria-label', '음성 입력');
  } else {
    // 언어에 따라 음성 인식 언어 설정
    const langMap = { ko: 'ko-KR', en: 'en-US', cn: 'zh-CN', jp: 'ja-JP' };
    recognition.lang = langMap[currentLang] || 'ko-KR';
    recognition.start();
    isListening = true;
    micBtn.classList.add('listening');
    micBtn.setAttribute('aria-label', '음성 입력 중지');
  }
}
let msgCounter = 0;

async function init() {
  try {
    const configRes = await fetch('/api/config');
    const config = await configRes.json();
    config.categories.forEach(c => { CATEGORY_NAMES[c.code] = c.name; });
    addBotMessage(config.persona, null, false, true);

    const faqRes = await fetch('/api/faq');
    const faqData = await faqRes.json();
    renderSidebar(faqData.items);
  } catch (e) {
    addBotMessage('챗봇 초기화 중 오류가 발생했습니다. 페이지를 새로고침 해주세요.');
  }
}

function renderSidebar(items) {
  const el = document.getElementById('sidebarContent');
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });
  let html = '';
  for (const [cat, faqs] of Object.entries(grouped)) {
    faqs.forEach(faq => {
      const catName = CATEGORY_NAMES[cat] || cat;
      const escapedQuestion = faq.question.replace(/'/g, "\\'");
      html += `<div class="faq-item" tabindex="0" role="button" aria-label="${faq.question}" onclick="askFaq('${escapedQuestion}')" onkeydown="handleFaqKeydown(event, '${escapedQuestion}')">
        <span class="cat-label">${catName}</span>
        <div class="faq-text">${faq.question}</div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

function handleFaqKeydown(event, question) {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    askFaq(question);
  }
}

function askFaq(question) {
  queryInput.value = question;
  sendQuery();
}

let lastUserQuery = '';

async function sendQuery() {
  const query = queryInput.value.trim();
  if (!query) return;
  lastUserQuery = query;
  hideAutocomplete();
  addUserMessage(query);
  queryInput.value = '';
  if (typeof updateInputState === 'function') updateInputState(); // reset auto-grow + counter
  sendBtn.disabled = true;
  typingEl.classList.add('show');
  scrollToBottom();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, lang: currentLang, session_id: currentSessionId }),
    });
    const data = await res.json();
    if (data.error) {
      addBotMessage(data.error);
      if (typeof showToast === 'function') showToast(data.error, 'error');
    } else {
      if (data.session_id) currentSessionId = data.session_id;
      const catName = CATEGORY_NAMES[data.category] || data.category;
      addBotMessage(data.answer, catName, data.is_escalation);
    }
  } catch (e) {
    addBotMessage('서버 연결 오류가 발생했습니다. 다시 시도해 주세요.');
    if (typeof showToast === 'function') showToast('서버 연결 오류 — 다시 시도해 주세요.', 'error');
  } finally {
    typingEl.classList.remove('show');
    if (typeof updateInputState === 'function') updateInputState();
    queryInput.focus();
  }
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(content);
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  div.appendChild(meta);
  messagesEl.insertBefore(div, typingEl);
  scrollToBottom();
}

function addBotMessage(text, category, isEscalation, isWelcome) {
  const div = document.createElement('div');
  div.className = 'msg bot';

  const contentDiv = document.createElement('div');
  contentDiv.className = 'bot-content';

  if (isWelcome) {
    contentDiv.innerHTML = `<div style="font-size:14px;line-height:1.8">${escapeHtml(text)}</div>`;
    div.appendChild(contentDiv);
  } else {
    let html = formatBotAnswer(text);
    if (lastUserQuery) {
      html = highlightKeywords(html, lastUserQuery);
    }
    // 결론만 보이고 나머지는 접기
    const collapsibleHtml = addCollapsible(html);
    contentDiv.innerHTML = '';
    div.appendChild(contentDiv);
    // 타이핑 이펙트 적용
    typeEffect(contentDiv, collapsibleHtml, () => {
      // 접기/펼치기 버튼 추가 (접힌 섹션이 있을 때만)
      if (contentDiv.querySelector('.collapsible')) {
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'collapse-toggle';
        toggleBtn.textContent = '상세 보기';
        toggleBtn.setAttribute('aria-expanded', 'false');
        toggleBtn.setAttribute('aria-label', '상세 답변 보기');
        toggleBtn.onclick = function() {
          div.classList.toggle('expanded');
          const isExpanded = div.classList.contains('expanded');
          toggleBtn.textContent = isExpanded ? '접기' : '상세 보기';
          toggleBtn.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
          toggleBtn.setAttribute('aria-label', isExpanded ? '상세 답변 접기' : '상세 답변 보기');
        };
        contentDiv.appendChild(toggleBtn);
      }
    });
  }

  if (isEscalation) {
    const badge = document.createElement('div');
    badge.className = 'escalation-badge';
    badge.textContent = '상담 연결 권고';
    div.appendChild(badge);
  }

  const meta = document.createElement('div');
  meta.className = 'meta';
  let metaHTML = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  if (category) metaHTML += ` <span class="cat-tag">${category}</span>`;
  meta.innerHTML = metaHTML;
  div.appendChild(meta);

  if (!isWelcome) {
    const queryId = 'msg_' + Date.now() + '_' + (++msgCounter);
    const fbArea = document.createElement('div');
    fbArea.className = 'feedback-area';
    fbArea.innerHTML =
      `<button class="feedback-btn" onclick="sendFeedback('${queryId}','helpful',this)">유용해요</button>` +
      `<button class="feedback-btn" onclick="sendFeedback('${queryId}','unhelpful',this)">아쉬워요</button>`;
    div.appendChild(fbArea);
  }

  messagesEl.insertBefore(div, typingEl);
  scrollToBottom();
}

function addCollapsible(html) {
  // 결론 섹션은 보이고, 설명/근거/면책은 collapsible 클래스로 감쌈
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const sections = temp.querySelectorAll('.section');
  let foundConclusion = false;
  sections.forEach(sec => {
    const title = sec.querySelector('.section-title');
    if (title && title.textContent === '결론') {
      foundConclusion = true;
    } else if (foundConclusion) {
      sec.classList.add('collapsible');
    }
  });
  const disclaimer = temp.querySelector('.disclaimer');
  if (disclaimer && foundConclusion) disclaimer.classList.add('collapsible');
  return temp.innerHTML;
}

function formatBotAnswer(text) {
  const sections = text.split('\n\n');
  let html = '';
  for (const section of sections) {
    const trimmed = section.trim();
    if (!trimmed) continue;

    if (trimmed.startsWith('문의하신 내용은')) {
      html += `<div style="font-size:13px;color:#78909C;margin-bottom:4px">${escapeHtml(trimmed)}</div>`;
    } else if (trimmed.startsWith('결론:')) {
      const content = trimmed.replace('결론:', '').trim();
      html += `<div class="section"><div class="section-title">결론</div><div class="section-content" style="color:#E0E0E0;font-weight:500">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('설명:')) {
      const content = trimmed.replace('설명:', '').trim();
      html += `<div class="section"><div class="section-title">설명</div><div class="section-content">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('민원인이 확인할 사항:')) {
      const content = trimmed.replace('민원인이 확인할 사항:', '').trim();
      html += `<div class="section"><div class="section-title">확인 사항</div><div class="section-content">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('근거:')) {
      const content = trimmed.replace('근거:', '').trim();
      html += `<div class="section"><div class="section-title">법적 근거</div><div class="legal-ref">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('추가 안내:')) {
      const content = trimmed.replace('추가 안내:', '').trim();
      html += `<div class="section"><div class="section-title" style="color:#FFB74D">추가 안내</div><div class="section-content" style="color:#FFCC80">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('안내:')) {
      const content = trimmed.replace('안내:', '').trim();
      html += `<div class="disclaimer">${escapeHtml(content)}</div>`;
    } else {
      html += `<div class="section"><div class="section-content">${escapeHtml(trimmed)}</div></div>`;
    }
  }
  return html || escapeHtml(text);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g, '<br>');
}

/* --- 키워드 하이라이트 --- */
function highlightKeywords(html, query) {
  const keywords = query.split(/\s+/).filter(w => w.length >= 2);
  if (keywords.length === 0) return html;
  const escaped = keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const pattern = new RegExp('(' + escaped.join('|') + ')', 'gi');
  return html.replace(/>([^<]+)</g, (match, textContent) => {
    return '>' + textContent.replace(pattern, '<mark>$1</mark>') + '<';
  });
}

/* --- 자동완성 --- */
const acDropdown = document.getElementById('autocompleteDropdown');
let acDebounceTimer = null;
let acActiveIndex = -1;
let acSuggestions = [];

function hideAutocomplete() {
  acDropdown.classList.remove('show');
  acDropdown.innerHTML = '';
  acActiveIndex = -1;
}

function showAutocomplete(suggestions) {
  if (suggestions.length === 0) { hideAutocomplete(); return; }
  acActiveIndex = -1;
  let html = '';
  suggestions.forEach((s, i) => {
    const catName = CATEGORY_NAMES[s.category] || s.category;
    const escapedQ = s.question.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html += `<div class="ac-item" role="option" data-index="${i}" onmousedown="selectAutocomplete(${i})">
      <div class="ac-cat">${catName}</div>
      <div class="ac-question">${escapedQ}</div>
    </div>`;
  });
  acDropdown.innerHTML = html;
  acDropdown.classList.add('show');
}

function selectAutocomplete(index) {
  if (acSuggestions[index]) {
    queryInput.value = acSuggestions[index].question;
    hideAutocomplete();
    sendQuery();
  }
}

queryInput.addEventListener('input', () => {
  clearTimeout(acDebounceTimer);
  const q = queryInput.value.trim();
  if (!q) { hideAutocomplete(); return; }
  acDebounceTimer = setTimeout(async () => {
    try {
      const res = await fetch('/api/autocomplete?q=' + encodeURIComponent(q));
      const data = await res.json();
      acSuggestions = data.suggestions || [];
      if (queryInput.value.trim() === q) {
        showAutocomplete(acSuggestions);
      }
    } catch (e) { hideAutocomplete(); }
  }, 300);
});

queryInput.addEventListener('keydown', (e) => {
  if (!acDropdown.classList.contains('show')) return;
  const items = acDropdown.querySelectorAll('.ac-item');
  if (items.length === 0) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acActiveIndex = Math.min(acActiveIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acActiveIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acActiveIndex = Math.max(acActiveIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === acActiveIndex));
  } else if (e.key === 'Enter' && acActiveIndex >= 0) {
    e.preventDefault();
    e.stopImmediatePropagation();
    selectAutocomplete(acActiveIndex);
  } else if (e.key === 'Escape') {
    hideAutocomplete();
  }
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.autocomplete-wrapper')) { hideAutocomplete(); }
});

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendFeedback(queryId, rating, btn) {
  const area = btn.parentElement;
  area.querySelectorAll('.feedback-btn').forEach(b => { b.disabled = true; });
  btn.classList.add('selected');
  try {
    await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query_id: queryId, rating: rating }),
    });
  } catch (e) { /* 무시 */ }
  area.innerHTML = '<div class="feedback-thanks">감사합니다</div>';
}

/* --- Enter 전송 / Shift+Enter 줄바꿈 / Esc 자동완성 닫기 --- */
queryInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendQuery();
  }
});

/* --- Textarea auto-grow + char counter + send-button enable/disable --- */
const charCounterEl = document.getElementById('charCounter');
const MAX_CHARS = 1000;

function updateInputState() {
  const len = queryInput.value.length;
  // Char counter
  charCounterEl.textContent = `${len} / ${MAX_CHARS}`;
  charCounterEl.classList.toggle('warn', len >= MAX_CHARS * 0.85 && len < MAX_CHARS);
  charCounterEl.classList.toggle('error', len >= MAX_CHARS);
  // Send button: empty → disabled
  sendBtn.disabled = queryInput.value.trim().length === 0;
  // Auto-grow up to ~5 lines (max-height in CSS handles overflow)
  queryInput.style.height = 'auto';
  queryInput.style.height = Math.min(queryInput.scrollHeight, 120) + 'px';
}

queryInput.addEventListener('input', updateInputState);
// Initial state on load
window.addEventListener('DOMContentLoaded', updateInputState);
// Also call once now (script runs after element exists)
updateInputState();

/* --- 대화 내보내기 --- */
let currentSessionId = null;

function toggleExportDropdown() {
  const dd = document.getElementById('exportDropdown');
  const btn = document.getElementById('exportBtn');
  dd.classList.toggle('show');
  const isOpen = dd.classList.contains('show');
  btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  if (isOpen) {
    // Focus first menu item for keyboard users
    const firstItem = dd.querySelector('button');
    if (firstItem) firstItem.focus();
  }
}

// 드롭다운 외부 클릭 시 닫기
document.addEventListener('click', (e) => {
  const wrapper = document.querySelector('.export-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('exportDropdown').classList.remove('show');
  }
});

function gatherMessagesFromDOM() {
  const msgs = [];
  const msgEls = document.querySelectorAll('.msg');
  msgEls.forEach(el => {
    const role = el.classList.contains('user') ? 'user' : 'bot';
    // Get the first child div/element text for the message content
    const contentEl = el.querySelector('.section-content, [style]');
    let message = '';
    if (contentEl) {
      message = contentEl.textContent.trim();
    } else {
      // Fallback: get all text before the meta line
      const clone = el.cloneNode(true);
      const meta = clone.querySelector('.meta');
      if (meta) meta.remove();
      const fb = clone.querySelector('.feedback-area');
      if (fb) fb.remove();
      const fbThanks = clone.querySelector('.feedback-thanks');
      if (fbThanks) fbThanks.remove();
      const badge = clone.querySelector('.escalation-badge');
      if (badge) badge.remove();
      message = clone.textContent.trim();
    }
    const metaEl = el.querySelector('.meta');
    const timestamp = metaEl ? metaEl.textContent.trim() : '';
    msgs.push({ role, message, timestamp });
  });
  return msgs;
}

function generateClientExport(format, messages) {
  const dateStr = new Date().toLocaleString('ko-KR');
  if (format === 'text') {
    const lines = ['보세전시장 챗봇 대화 기록', '날짜: ' + dateStr, '---'];
    messages.forEach(m => {
      const label = m.role === 'user' ? '[사용자]' : '[챗봇]';
      lines.push(label + ' ' + m.message);
    });
    lines.push('---', '총 ' + messages.length + '개 대화');
    return lines.join('\n');
  }
  if (format === 'json') {
    return JSON.stringify({
      export_date: dateStr,
      messages_count: messages.length,
      messages: messages
    }, null, 2);
  }
  if (format === 'csv') {
    const rows = [['role', 'message', 'timestamp'].join(',')];
    messages.forEach(m => {
      const escaped = m.message.replace(/"/g, '""');
      rows.push([m.role, '"' + escaped + '"', m.timestamp].join(','));
    });
    return rows.join('\n');
  }
  if (format === 'html') {
    const bubbles = messages.map(m => {
      const cls = m.role === 'user' ? 'user' : 'bot';
      const label = m.role === 'user' ? '사용자' : '챗봇';
      const safe = m.message.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<div class="bubble ' + cls + '"><span class="label">' + label + '</span>' + safe + '</div>';
    }).join('\n');
    return '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>대화 기록</title>' +
      '<style>body{background:#1e1e1e;color:#e0e0e0;font-family:sans-serif;padding:20px}' +
      '.bubble{padding:12px 16px;margin:8px 0;border-radius:12px;max-width:80%;line-height:1.5}' +
      '.bubble .label{display:block;font-size:.75em;margin-bottom:4px;opacity:.7}' +
      '.bubble.user{background:#2b5278;margin-left:auto;border-bottom-right-radius:4px}' +
      '.bubble.bot{background:#333;margin-right:auto;border-bottom-left-radius:4px}' +
      '</style></head><body><div style="max-width:700px;margin:0 auto">' +
      '<h1 style="text-align:center;font-size:1.4em">보세전시장 챗봇 대화 기록</h1>' +
      '<p style="text-align:center;color:#aaa">날짜: ' + dateStr + '</p>' +
      bubbles +
      '<p style="text-align:center;color:#aaa;border-top:1px solid #444;padding-top:10px;margin-top:20px">총 ' + messages.length + '개 대화</p>' +
      '</div></body></html>';
  }
  return '';
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function exportConversation(format) {
  document.getElementById('exportDropdown').classList.remove('show');

  const extMap = { text: 'txt', json: 'json', csv: 'csv', html: 'html' };
  const mimeMap = { text: 'text/plain', json: 'application/json', csv: 'text/csv', html: 'text/html' };
  const filename = 'conversation_export.' + extMap[format];

  // Try server-side export if we have a session_id
  if (currentSessionId) {
    try {
      const res = await fetch('/api/export', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: currentSessionId, format: format }),
      });
      if (res.ok) {
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        return;
      }
    } catch (e) {
      // Fall through to client-side export
    }
  }

  // Client-side fallback
  const messages = gatherMessagesFromDOM();
  if (messages.length === 0) {
    return;
  }
  const content = generateClientExport(format, messages);
  downloadFile(content, filename, mimeMap[format]);
}

/* --- 테마 토글 (data-theme 속성 + body.light 둘 다 동기화) --- */
function applyTheme(theme) {
  // theme: 'light' | 'dark'
  const root = document.documentElement;
  root.setAttribute('data-theme', theme);
  document.body.classList.toggle('light', theme === 'light');
  const toggle = document.getElementById('themeToggle');
  if (toggle) {
    toggle.innerHTML = theme === 'light' ? '&#x2600;' : '&#x263E;';
    toggle.setAttribute('aria-label', theme === 'light' ? '다크 모드로 전환' : '라이트 모드로 전환');
    toggle.setAttribute('aria-pressed', theme === 'light' ? 'true' : 'false');
  }
}
function toggleTheme() {
  const next = (document.documentElement.getAttribute('data-theme') === 'light') ? 'dark' : 'light';
  localStorage.setItem('chatbot-theme', next);
  applyTheme(next);
}
(function initTheme() {
  let saved = localStorage.getItem('chatbot-theme');
  if (saved !== 'light' && saved !== 'dark') {
    // Honour OS preference on first visit
    saved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches)
      ? 'light' : 'dark';
  }
  applyTheme(saved);
})();

/* --- 모바일 사이드바 --- */
function toggleMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const hamburger = document.getElementById('hamburgerBtn');
  sidebar.classList.toggle('mobile-open');
  overlay.classList.toggle('show');
  const isOpen = sidebar.classList.contains('mobile-open');
  hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  hamburger.setAttribute('aria-label', isOpen ? '사이드바 메뉴 닫기' : '사이드바 메뉴 열기');
}

/* --- 타이핑 이펙트 --- */
function typeEffect(element, html, callback) {
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const text = temp.textContent;
  element.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  element.appendChild(cursor);
  let i = 0;
  const speed = 15;
  function typeNext() {
    if (i < text.length) {
      cursor.before(document.createTextNode(text.charAt(i)));
      i++;
      setTimeout(typeNext, speed);
    } else {
      cursor.remove();
      element.innerHTML = html;
      if (callback) callback();
    }
  }
  typeNext();
}

/* ──────────────────────────────────────────────
   Keyboard shortcuts (UI polish)
   - "/"   → focus input  (when not already typing into a field)
   - Ctrl+/ → focus input (existing power-user shortcut, kept)
   - Esc   → close sidebar drawer (mobile) / export dropdown / autocomplete
   ────────────────────────────────────────────── */
function isTypingTarget(target) {
  if (!target) return false;
  const tag = target.tagName;
  return tag === 'INPUT' || tag === 'TEXTAREA' || target.isContentEditable;
}

document.addEventListener('keydown', (e) => {
  // "/" focuses the message input when not already focused on another field
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.altKey && !isTypingTarget(e.target)) {
    e.preventDefault();
    queryInput.focus();
    return;
  }
  // Power-user: Ctrl+/ regardless of current focus
  if (e.ctrlKey && e.key === '/') {
    e.preventDefault();
    queryInput.focus();
    return;
  }
  // Esc cascade: export dropdown → autocomplete → mobile sidebar
  if (e.key === 'Escape') {
    const dd = document.getElementById('exportDropdown');
    if (dd && dd.classList.contains('show')) {
      dd.classList.remove('show');
      const btn = document.getElementById('exportBtn');
      if (btn) { btn.setAttribute('aria-expanded', 'false'); btn.focus(); }
      return;
    }
    if (acDropdown && acDropdown.classList.contains('show')) {
      hideAutocomplete();
      return;
    }
    const sidebar = document.getElementById('sidebar');
    if (sidebar && sidebar.classList.contains('mobile-open')) {
      toggleMobileSidebar();
      return;
    }
  }
});

/* --- Sidebar FAQ search filter --- */
(function initSidebarSearch() {
  const searchInput = document.getElementById('sidebarSearch');
  const sidebarContent = document.getElementById('sidebarContent');
  if (!searchInput || !sidebarContent) return;

  function applyFilter() {
    const q = searchInput.value.trim().toLowerCase();
    const items = sidebarContent.querySelectorAll('.faq-item');
    items.forEach(item => {
      const text = (item.textContent || '').toLowerCase();
      if (!q || text.includes(q)) {
        item.classList.remove('search-hidden');
      } else {
        item.classList.add('search-hidden');
      }
    });
  }

  searchInput.addEventListener('input', applyFilter);
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      searchInput.value = '';
      applyFilter();
      searchInput.blur();
    }
  });
})();

/* --- Toast notifications (transient inline alerts) --- */
function showToast(message, kind = 'info', durationMs = 4000) {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const el = document.createElement('div');
  el.className = 'toast ' + (kind || 'info');
  el.setAttribute('role', kind === 'error' ? 'alert' : 'status');
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
    el.style.opacity = '0';
    el.style.transform = 'translateX(20px)';
    setTimeout(() => el.remove(), 260);
  }, durationMs);
}

/* --- Export dropdown keyboard navigation --- */
document.getElementById('exportDropdown').addEventListener('keydown', (e) => {
  const items = Array.from(e.currentTarget.querySelectorAll('button'));
  const currentIndex = items.indexOf(document.activeElement);
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    const next = currentIndex < items.length - 1 ? currentIndex + 1 : 0;
    items[next].focus();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = currentIndex > 0 ? currentIndex - 1 : items.length - 1;
    items[prev].focus();
  } else if (e.key === 'Tab') {
    document.getElementById('exportDropdown').classList.remove('show');
    document.getElementById('exportBtn').setAttribute('aria-expanded', 'false');
  }
});

/* --- Update aria-expanded on export dropdown close via outside click --- */
const origExportClickHandler = document.addEventListener('click', () => {});
// Patched in existing click handler above - also update aria-expanded
(function patchExportDropdownAriaOnOutsideClick() {
  const dd = document.getElementById('exportDropdown');
  const btn = document.getElementById('exportBtn');
  const observer = new MutationObserver(() => {
    const isOpen = dd.classList.contains('show');
    btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });
  observer.observe(dd, { attributes: true, attributeFilter: ['class'] });
})();
