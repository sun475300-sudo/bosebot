<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D1117" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#FAFAF7" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/icon-192.svg">
<link rel="apple-touch-icon" href="/static/icon-192.svg">
<title>보세전시장 민원응대 챗봇 Premium</title>
<style>
  /* ============================================================
     보세전시장 챗봇 — 가독성 우선 디자인 토큰
     원칙: 저채도, 솔리드 표면, 절제된 그림자, 충분한 라인높이
     ============================================================ */

  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  /* 다크(기본) 토큰 — GitHub Dark 계열, 저채도 */
  :root {
    --bg:           #0D1117;
    --bg-elev:      #161B22;
    --bg-elev-2:    #1C2128;
    --bg-input:     #161B22;
    --fg:           #E6EDF3;
    --fg-strong:    #F0F6FC;
    --fg-muted:     #8B949E;
    --fg-subtle:    #6E7681;
    --border:       #30363D;
    --border-subtle:#21262D;
    --accent:       #58A6FF;
    --accent-strong:#79B8FF;
    --accent-bg:    rgba(88,166,255,0.12);
    --accent-border:rgba(88,166,255,0.30);
    --success:      #3FB950;
    --warning:      #D29922;
    --danger:       #F85149;
    --mark:         rgba(210,153,34,0.28);
    --user-bubble:  #1F6FEB;
    --user-bubble-fg:#FFFFFF;
    --code-bg:      #161B22;
    --code-fg:      #E6EDF3;
    --shadow-sm:    0 1px 2px rgba(0,0,0,0.20);
    --shadow:       0 1px 3px rgba(0,0,0,0.25), 0 4px 10px rgba(0,0,0,0.18);
    --radius:       12px;
    --radius-sm:    8px;
    --line:         1.65;
    --content-max:  72ch;
    --font-sans:    'Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
    --font-mono:    'JetBrains Mono','D2Coding',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }

  /* 라이트 토큰 — 시스템 환경 또는 body.light 일 때 */
  @media (prefers-color-scheme: light) {
    body:not(.force-dark) {
      --bg:           #FAFAF7;
      --bg-elev:      #FFFFFF;
      --bg-elev-2:    #F1F2F4;
      --bg-input:     #F6F8FA;
      --fg:           #1F2328;
      --fg-strong:    #0B1221;
      --fg-muted:     #57606A;
      --fg-subtle:    #6E7781;
      --border:       #D0D7DE;
      --border-subtle:#E5E7EB;
      --accent:       #0969DA;
      --accent-strong:#0550AE;
      --accent-bg:    rgba(9,105,218,0.08);
      --accent-border:rgba(9,105,218,0.25);
      --success:      #1A7F37;
      --warning:      #9A6700;
      --danger:       #CF222E;
      --mark:         rgba(241,196,15,0.45);
      --user-bubble:  #0969DA;
      --user-bubble-fg:#FFFFFF;
      --code-bg:      #F6F8FA;
      --code-fg:      #1F2328;
      --shadow-sm:    0 1px 2px rgba(31,35,40,0.06);
      --shadow:       0 1px 3px rgba(31,35,40,0.08), 0 4px 10px rgba(31,35,40,0.05);
    }
  }
  body.light {
    --bg:           #FAFAF7;
    --bg-elev:      #FFFFFF;
    --bg-elev-2:    #F1F2F4;
    --bg-input:     #F6F8FA;
    --fg:           #1F2328;
    --fg-strong:    #0B1221;
    --fg-muted:     #57606A;
    --fg-subtle:    #6E7781;
    --border:       #D0D7DE;
    --border-subtle:#E5E7EB;
    --accent:       #0969DA;
    --accent-strong:#0550AE;
    --accent-bg:    rgba(9,105,218,0.08);
    --accent-border:rgba(9,105,218,0.25);
    --success:      #1A7F37;
    --warning:      #9A6700;
    --danger:       #CF222E;
    --mark:         rgba(241,196,15,0.45);
    --user-bubble:  #0969DA;
    --user-bubble-fg:#FFFFFF;
    --code-bg:      #F6F8FA;
    --code-fg:      #1F2328;
    --shadow-sm:    0 1px 2px rgba(31,35,40,0.06);
    --shadow:       0 1px 3px rgba(31,35,40,0.08), 0 4px 10px rgba(31,35,40,0.05);
  }

  /* Reset & base */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--fg);
    font-size: 16px;
    line-height: var(--line);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 8px;
    border: 2px solid var(--bg);
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-subtle); }
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  header {
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
    flex-shrink: 0;
  }
  header .logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
    box-shadow: var(--shadow-sm);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px; font-weight: 600;
    color: var(--fg-strong);
    letter-spacing: -0.2px;
  }
  header .badge {
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    font-size: 11px; font-weight: 600;
    padding: 3px 8px;
    border-radius: 999px;
    color: var(--accent);
    letter-spacing: 0.3px;
  }
  header .status {
    margin-left: auto;
    font-size: 12px; font-weight: 500;
    color: var(--success);
    display: flex; align-items: center; gap: 6px;
  }
  header .status::before {
    content: ''; width: 7px; height: 7px;
    background: var(--success); border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(63,185,80,0.20);
  }

  .container {
    flex: 1;
    display: flex;
    overflow: hidden;
    background: var(--bg);
  }

  .sidebar {
    width: 320px;
    background: var(--bg-elev);
    border-right: 1px solid var(--border-subtle);
    display: none;
    flex-direction: column;
  }
  @media (min-width: 900px) { .sidebar { display: flex; } }

  .sidebar-header {
    padding: 20px 18px 12px;
    font-size: 11px;
    font-weight: 700;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .sidebar-content {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 16px;
  }
  .faq-item {
    display: block;
    padding: 10px 12px;
    margin-bottom: 4px;
    border-radius: var(--radius-sm);
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: background-color 0.15s, border-color 0.15s;
  }
  .faq-item:hover {
    background: var(--accent-bg);
    border-left-color: var(--accent-border);
  }
  .faq-item .cat-label {
    display: inline-block;
    font-size: 10px; font-weight: 600;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 2px 7px;
    border-radius: 4px;
    margin-bottom: 4px;
    letter-spacing: 0.2px;
  }
  .faq-item .faq-text {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--fg);
  }

  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    min-width: 0;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: var(--content-max);
    padding: 16px 20px;
    border-radius: 14px;
    font-size: 15.5px;
    line-height: 1.7;
    margin-bottom: 14px;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bg-elev);
    border: 1px solid var(--border-subtle);
    color: var(--fg);
    box-shadow: var(--shadow-sm);
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    color: var(--user-bubble-fg);
    border-bottom-right-radius: 4px;
    box-shadow: var(--shadow-sm);
  }
  .msg .meta {
    font-size: 11.5px;
    color: var(--fg-muted);
    margin-top: 8px;
    letter-spacing: 0.2px;
  }
  .msg.user .meta { color: rgba(255,255,255,0.78); }
  .cat-tag {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 7px;
    background: var(--accent-bg);
    color: var(--accent);
    border-radius: 4px;
    font-size: 10.5px;
    font-weight: 600;
  }

  .msg.bot .section { margin: 10px 0; }
  .msg.bot .section + .section { margin-top: 14px; }
  .msg.bot .section-title {
    display: inline-block;
    font-size: 12px; font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
    padding-bottom: 3px;
    border-bottom: 2px solid var(--accent-border);
  }
  .msg.bot .section-content {
    color: var(--fg);
    font-size: 15.5px;
    line-height: 1.7;
  }
  .msg.bot .legal-ref {
    margin-top: 4px;
    padding: 12px 14px;
    background: var(--accent-bg);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--fg);
    font-family: var(--font-sans);
  }
  .msg.bot .legal-ref a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: var(--accent-border);
  }
  .msg.bot .legal-ref a:hover { text-decoration-color: var(--accent); }
  .msg.bot .disclaimer {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border-subtle);
    font-size: 12.5px;
    color: var(--fg-muted);
    line-height: 1.6;
  }

  .msg.bot pre, .msg.bot code {
    font-family: var(--font-mono);
    font-size: 13.5px;
    background: var(--code-bg);
    color: var(--code-fg);
  }
  .msg.bot code {
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid var(--border-subtle);
  }
  .msg.bot pre {
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--border-subtle);
    overflow-x: auto;
    margin: 8px 0;
    line-height: 1.55;
  }
  .msg.bot pre code { padding: 0; border: 0; background: transparent; }

  .msg.bot mark {
    background: var(--mark);
    color: inherit;
    padding: 0 2px;
    border-radius: 2px;
  }

  .escalation-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 10px;
    background: rgba(217,119,6,0.12);
    border: 1px solid rgba(217,119,6,0.40);
    color: var(--warning);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }

  .typing {
    display: none;
    padding: 12px 18px;
    background: var(--bg-elev);
    border: 1px solid var(--border-subtle);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    box-shadow: var(--shadow-sm);
    margin-bottom: 14px;
  }
  .typing.show { display: inline-flex; gap: 4px; align-items: center; }
  .typing span {
    width: 7px; height: 7px;
    background: var(--fg-muted);
    border-radius: 50%;
    animation: typingDot 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes typingDot {
    0%,80%,100% { opacity: 0.3; transform: translateY(0); }
    40%         { opacity: 1;   transform: translateY(-3px); }
  }

  .input-area {
    display: flex;
    gap: 10px;
    padding: 16px 32px 18px;
    background: var(--bg-elev);
    border-top: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 15px;
    font-family: var(--font-sans);
    color: var(--fg);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-area input::placeholder { color: var(--fg-subtle); }
  .input-area input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .input-area button {
    background: var(--accent);
    color: #fff;
    border: 0;
    border-radius: 10px;
    padding: 0 22px;
    font-size: 14px; font-weight: 600;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: background-color 0.15s, transform 0.05s;
  }
  .input-area button:hover  { background: var(--accent-strong); }
  .input-area button:active { transform: translateY(1px); }
  .input-area button:disabled {
    background: var(--border); color: var(--fg-muted);
    cursor: not-allowed; transform: none;
  }

  .feedback-area {
    display: flex; gap: 8px;
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border-subtle);
  }
  .feedback-btn {
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg-muted);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .feedback-btn:hover {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent);
  }
  .feedback-btn.selected {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
    cursor: default;
  }
  .feedback-thanks {
    font-size: 12.5px;
    color: var(--success);
    padding: 4px 0;
  }

  .export-wrapper { position: relative; }
  .export-btn,
  .theme-toggle,
  .lang-selector,
  .hamburger {
    padding: 6px 10px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    color: var(--fg);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background-color 0.15s, border-color 0.15s;
    line-height: 1;
  }
  .export-btn:hover,
  .theme-toggle:hover,
  .lang-selector:hover,
  .hamburger:hover {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent);
  }
  .lang-selector option { background: var(--bg-elev); color: var(--fg); }

  .export-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    min-width: 160px;
    z-index: 200;
    box-shadow: var(--shadow);
  }
  .export-dropdown.show { display: block; }
  .export-dropdown button {
    display: block;
    width: 100%;
    padding: 10px 14px;
    background: transparent;
    border: 0;
    color: var(--fg);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    transition: background-color 0.15s;
  }
  .export-dropdown button:hover { background: var(--accent-bg); color: var(--accent); }
  .export-dropdown button + button { border-top: 1px solid var(--border-subtle); }

  #micBtn {
    width: 44px; height: 44px;
    padding: 0;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--fg-muted);
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  #micBtn:hover {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent);
  }
  #micBtn.listening {
    background: rgba(248,81,73,0.10);
    border-color: rgba(248,81,73,0.45);
    color: var(--danger);
    animation: micPulse 1.5s infinite;
  }
  @keyframes micPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(248,81,73,0.30); }
    50%     { box-shadow: 0 0 0 6px rgba(248,81,73,0); }
  }

  .autocomplete-wrapper { position: relative; flex: 1; }
  .autocomplete-wrapper input { width: 100%; }
  #autocompleteDropdown {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    z-index: 250;
    box-shadow: var(--shadow);
    max-height: 320px;
  }
  #autocompleteDropdown.show { display: block; }
  .ac-item {
    padding: 10px 14px;
    cursor: pointer;
    transition: background-color 0.12s;
    border-bottom: 1px solid var(--border-subtle);
  }
  .ac-item:last-child { border-bottom: 0; }
  .ac-item:hover, .ac-item.active { background: var(--accent-bg); }
  .ac-item .ac-cat {
    display: inline-block;
    font-size: 10px; font-weight: 600;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 1px 6px;
    border-radius: 3px;
    margin-bottom: 3px;
    letter-spacing: 0.2px;
  }
  .ac-item .ac-question {
    font-size: 13.5px;
    color: var(--fg);
    line-height: 1.5;
  }

  .collapse-toggle {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    transition: background-color 0.15s, color 0.15s;
  }
  .collapse-toggle:hover { background: var(--accent); color: #fff; }
  .msg.bot .collapsible { display: none; }
  .msg.bot.expanded .collapsible { display: block; }

  .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.7s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .hamburger { display: none; }
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 999;
  }
  .sidebar-overlay.show { display: block; }

  @media (max-width: 899px) {
    .hamburger { display: inline-flex; align-items: center; justify-content: center; }
    .sidebar {
      position: fixed; top: 0; bottom: 0; left: 0;
      width: 280px;
      z-index: 1000;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      display: flex !important;
    }
    .sidebar.mobile-open { transform: translateX(0); }
    header h1 { font-size: 14px; }
    header .badge { display: none; }
    .messages { padding: 16px; }
    .msg { max-width: 100%; padding: 14px 16px; font-size: 15px; }
    .input-area { padding: 12px; }
    .input-area input { padding: 12px 14px; font-size: 14px; }
    .input-area button { padding: 0 16px; font-size: 13px; }
  }
  @media (max-width: 400px) {
    header { padding: 10px 12px; gap: 8px; }
    header h1 { font-size: 13px; }
    .export-btn, .theme-toggle, .lang-selector { padding: 5px 8px; font-size: 13px; }
  }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }
  *:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .faq-item:focus-visible {
    background: var(--accent-bg);
    border-left-color: var(--accent);
    outline-offset: -2px;
  }
  .skip-link {
    position: absolute;
    top: -100%; left: 0;
    padding: 12px 20px;
    background: var(--accent);
    color: #fff;
    font-size: 14px; font-weight: 600;
    z-index: 10000;
    border-radius: 0 0 8px 0;
    text-decoration: none;
  }
  .skip-link:focus { top: 0; }

</style>
</head>
<body>

<a href="#queryInput" class="skip-link">메인 콘텐츠로 건너뛰기</a>

<header role="banner">
  <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileSidebar()" aria-label="사이드바 메뉴 열기" aria-expanded="false" aria-controls="sidebar"><span class="sr-only">메뉴</span>&#x2630;</button>
  <div class="logo">B</div>
  <h1>보세전시장 민원응대 챗봇</h1>
  <span class="badge">v4.0.0</span>
  <div class="status">운영 중</div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="테마 전환" aria-label="테마 전환"><span class="sr-only">테마 전환</span>&#x263E;</button>
  <div class="export-wrapper">
    <button class="export-btn" id="exportBtn" onclick="toggleExportDropdown()" title="대화 내보내기" aria-label="대화 내보내기" aria-expanded="false" aria-haspopup="true" aria-controls="exportDropdown"><span class="sr-only">내보내기</span>&#x2B07;</button>
    <div class="export-dropdown" id="exportDropdown" role="menu" aria-label="내보내기 형식 선택">
      <button role="menuitem" onclick="exportConversation('text')">Text (.txt)</button>
      <button role="menuitem" onclick="exportConversation('json')">JSON (.json)</button>
      <button role="menuitem" onclick="exportConversation('csv')">CSV (.csv)</button>
      <button role="menuitem" onclick="exportConversation('html')">HTML (.html)</button>
    </div>
  </div>
  <select id="langSelector" class="lang-selector" onchange="setLanguage(this.value)" aria-label="언어 선택">
    <option value="ko">KO</option>
    <option value="en">EN</option>
    <option value="cn">CN</option>
    <option value="jp">JP</option>
  </select>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()" aria-hidden="true"></div>
<div class="container">
  <aside class="sidebar" id="sidebar" role="complementary" aria-label="자주 묻는 질문">
    <div class="sidebar-header">자주 묻는 질문</div>
    <nav class="sidebar-content" id="sidebarContent" aria-label="자주 묻는 질문 목록"></nav>
  </aside>
  <main class="chat-area" role="main" aria-label="채팅 영역">
    <div class="messages" id="messages" aria-live="polite" aria-relevant="additions" aria-label="대화 메시지">
      <div class="typing" id="typing" role="status" aria-label="응답 작성 중">
        <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
        <span class="sr-only">응답을 작성하고 있습니다</span>
      </div>
    </div>
    <div class="input-area">
      <div class="autocomplete-wrapper">
        <label for="queryInput" class="sr-only">질문 입력</label>
        <input type="text" id="queryInput" placeholder="보세전시장에 대해 무엇이든 질문하세요..." autofocus autocomplete="off" aria-label="질문 입력" aria-autocomplete="list" aria-controls="autocompleteDropdown">
        <div id="autocompleteDropdown" role="listbox" aria-label="자동완성 제안"></div>
      </div>
      <button type="button" id="micBtn" onclick="toggleVoiceInput()" title="음성 입력" aria-label="음성 입력"><span class="sr-only">음성 입력</span>&#x1F3A4;</button>
      <button id="sendBtn" onclick="sendQuery()" aria-label="메시지 전송">전송</button>
    </div>
  </main>
</div>

<script>
/* --- Service Worker 등록 (PWA) --- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}

const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const queryInput = document.getElementById('queryInput');
const sendBtn = document.getElementById('sendBtn');
const CATEGORY_NAMES = {};

/* --- 다국어 지원 --- */
let currentLang = 'ko';

function setLanguage(lang) {
  currentLang = lang;
  document.getElementById('langSelector').value = lang;
}

/* --- 음성 입력 (Web Speech API) --- */
let recognition = null;
let isListening = false;
const micBtn = document.getElementById('micBtn');

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  micBtn.style.display = 'flex';
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    queryInput.value = transcript;
    queryInput.focus();
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
  };

  recognition.onerror = (event) => {
    isListening = false;
    micBtn.classList.remove('listening');
    if (event.error !== 'no-speech') {
      console.log('Speech recognition error:', event.error);
    }
  };
}

function toggleVoiceInput() {
  if (!recognition) return;
  if (isListening) {
    recognition.stop();
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.setAttribute('aria-label', '음성 입력');
  } else {
    // 언어에 따라 음성 인식 언어 설정
    const langMap = { ko: 'ko-KR', en: 'en-US', cn: 'zh-CN', jp: 'ja-JP' };
    recognition.lang = langMap[currentLang] || 'ko-KR';
    recognition.start();
    isListening = true;
    micBtn.classList.add('listening');
    micBtn.setAttribute('aria-label', '음성 입력 중지');
  }
}
let msgCounter = 0;

async function init() {
  try {
    const configRes = await fetch('/api/config');
    const config = await configRes.json();
    config.categories.forEach(c => { CATEGORY_NAMES[c.code] = c.name; });
    addBotMessage(config.persona, null, false, true);

    const faqRes = await fetch('/api/faq');
    const faqData = await faqRes.json();
    renderSidebar(faqData.items);
  } catch (e) {
    addBotMessage('챗봇 초기화 중 오류가 발생했습니다. 페이지를 새로고침 해주세요.');
  }
}

function renderSidebar(items) {
  const el = document.getElementById('sidebarContent');
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });
  let html = '';
  for (const [cat, faqs] of Object.entries(grouped)) {
    faqs.forEach(faq => {
      const catName = CATEGORY_NAMES[cat] || cat;
      const escapedQuestion = faq.question.replace(/'/g, "\\'");
      html += `<div class="faq-item" tabindex="0" role="button" aria-label="${faq.question}" onclick="askFaq('${escapedQuestion}')" onkeydown="handleFaqKeydown(event, '${escapedQuestion}')">
        <span class="cat-label">${catName}</span>
        <div class="faq-text">${faq.question}</div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

function handleFaqKeydown(event, question) {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    askFaq(question);
  }
}

function askFaq(question) {
  queryInput.value = question;
  sendQuery();
}

let lastUserQuery = '';

async function sendQuery() {
  const query = queryInput.value.trim();
  if (!query) return;
  lastUserQuery = query;
  hideAutocomplete();
  addUserMessage(query);
  queryInput.value = '';
  sendBtn.disabled = true;
  typingEl.classList.add('show');
  scrollToBottom();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, lang: currentLang, session_id: currentSessionId }),
    });
    const data = await res.json();
    if (data.error) {
      addBotMessage(data.error);
    } else {
      if (data.session_id) currentSessionId = data.session_id;
      const catName = CATEGORY_NAMES[data.category] || data.category;
      addBotMessage(data.answer, catName, data.is_escalation);
    }
  } catch (e) {
    addBotMessage('서버 연결 오류가 발생했습니다. 다시 시도해 주세요.');
  } finally {
    typingEl.classList.remove('show');
    sendBtn.disabled = false;
    queryInput.focus();
  }
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(content);
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  div.appendChild(meta);
  messagesEl.insertBefore(div, typingEl);
  scrollToBottom();
}

function addBotMessage(text, category, isEscalation, isWelcome) {
  const div = document.createElement('div');
  div.className = 'msg bot';

  const contentDiv = document.createElement('div');
  contentDiv.className = 'bot-content';

  if (isWelcome) {
    contentDiv.innerHTML = `<div style="font-size:15px;line-height:1.7">${escapeHtml(text)}</div>`;
    div.appendChild(contentDiv);
  } else {
    let html = formatBotAnswer(text);
    if (lastUserQuery) {
      html = highlightKeywords(html, lastUserQuery);
    }
    // 결론만 보이고 나머지는 접기
    const collapsibleHtml = addCollapsible(html);
    contentDiv.innerHTML = '';
    div.appendChild(contentDiv);
    // 타이핑 이펙트 적용
    typeEffect(contentDiv, collapsibleHtml, () => {
      // 접기/펼치기 버튼 추가 (접힌 섹션이 있을 때만)
      if (contentDiv.querySelector('.collapsible')) {
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'collapse-toggle';
        toggleBtn.textContent = '상세 보기';
        toggleBtn.setAttribute('aria-expanded', 'false');
        toggleBtn.setAttribute('aria-label', '상세 답변 보기');
        toggleBtn.onclick = function() {
          div.classList.toggle('expanded');
          const isExpanded = div.classList.contains('expanded');
          toggleBtn.textContent = isExpanded ? '접기' : '상세 보기';
          toggleBtn.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
          toggleBtn.setAttribute('aria-label', isExpanded ? '상세 답변 접기' : '상세 답변 보기');
        };
        contentDiv.appendChild(toggleBtn);
      }
    });
  }

  if (isEscalation) {
    const badge = document.createElement('div');
    badge.className = 'escalation-badge';
    badge.textContent = '상담 연결 권고';
    div.appendChild(badge);
  }

  const meta = document.createElement('div');
  meta.className = 'meta';
  let metaHTML = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  if (category) metaHTML += ` <span class="cat-tag">${category}</span>`;
  meta.innerHTML = metaHTML;
  div.appendChild(meta);

  if (!isWelcome) {
    const queryId = 'msg_' + Date.now() + '_' + (++msgCounter);
    const fbArea = document.createElement('div');
    fbArea.className = 'feedback-area';
    fbArea.innerHTML =
      `<button class="feedback-btn" onclick="sendFeedback('${queryId}','helpful',this)">유용해요</button>` +
      `<button class="feedback-btn" onclick="sendFeedback('${queryId}','unhelpful',this)">아쉬워요</button>`;
    div.appendChild(fbArea);
  }

  messagesEl.insertBefore(div, typingEl);
  scrollToBottom();
}

function addCollapsible(html) {
  // 결론 섹션은 보이고, 설명/근거/면책은 collapsible 클래스로 감쌈
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const sections = temp.querySelectorAll('.section');
  let foundConclusion = false;
  sections.forEach(sec => {
    const title = sec.querySelector('.section-title');
    if (title && title.textContent === '결론') {
      foundConclusion = true;
    } else if (foundConclusion) {
      sec.classList.add('collapsible');
    }
  });
  const disclaimer = temp.querySelector('.disclaimer');
  if (disclaimer && foundConclusion) disclaimer.classList.add('collapsible');
  return temp.innerHTML;
}

function formatBotAnswer(text) {
  const sections = text.split('\n\n');
  let html = '';
  for (const section of sections) {
    const trimmed = section.trim();
    if (!trimmed) continue;

    if (trimmed.startsWith('문의하신 내용은')) {
      html += `<div style="font-size:13px;color:var(--fg-muted);margin-bottom:6px">${escapeHtml(trimmed)}</div>`;
    } else if (trimmed.startsWith('결론:')) {
      const content = trimmed.replace('결론:', '').trim();
      html += `<div class="section"><div class="section-title">결론</div><div class="section-content" style="color:var(--fg-strong);font-weight:600">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('설명:')) {
      const content = trimmed.replace('설명:', '').trim();
      html += `<div class="section"><div class="section-title">설명</div><div class="section-content">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('민원인이 확인할 사항:')) {
      const content = trimmed.replace('민원인이 확인할 사항:', '').trim();
      html += `<div class="section"><div class="section-title">확인 사항</div><div class="section-content">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('근거:')) {
      const content = trimmed.replace('근거:', '').trim();
      html += `<div class="section"><div class="section-title">법적 근거</div><div class="legal-ref">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('추가 안내:')) {
      const content = trimmed.replace('추가 안내:', '').trim();
      html += `<div class="section"><div class="section-title" style="color:var(--warning);border-bottom-color:rgba(217,119,6,0.30)">추가 안내</div><div class="section-content" style="color:var(--fg)">${escapeHtml(content)}</div></div>`;
    } else if (trimmed.startsWith('안내:')) {
      const content = trimmed.replace('안내:', '').trim();
      html += `<div class="disclaimer">${escapeHtml(content)}</div>`;
    } else {
      html += `<div class="section"><div class="section-content">${escapeHtml(trimmed)}</div></div>`;
    }
  }
  return html || escapeHtml(text);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g, '<br>');
}

/* --- 키워드 하이라이트 --- */
function highlightKeywords(html, query) {
  const keywords = query.split(/\s+/).filter(w => w.length >= 2);
  if (keywords.length === 0) return html;
  const escaped = keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const pattern = new RegExp('(' + escaped.join('|') + ')', 'gi');
  return html.replace(/>([^<]+)</g, (match, textContent) => {
    return '>' + textContent.replace(pattern, '<mark>$1</mark>') + '<';
  });
}

/* --- 자동완성 --- */
const acDropdown = document.getElementById('autocompleteDropdown');
let acDebounceTimer = null;
let acActiveIndex = -1;
let acSuggestions = [];

function hideAutocomplete() {
  acDropdown.classList.remove('show');
  acDropdown.innerHTML = '';
  acActiveIndex = -1;
}

function showAutocomplete(suggestions) {
  if (suggestions.length === 0) { hideAutocomplete(); return; }
  acActiveIndex = -1;
  let html = '';
  suggestions.forEach((s, i) => {
    const catName = CATEGORY_NAMES[s.category] || s.category;
    const escapedQ = s.question.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html += `<div class="ac-item" role="option" data-index="${i}" onmousedown="selectAutocomplete(${i})">
      <div class="ac-cat">${catName}</div>
      <div class="ac-question">${escapedQ}</div>
    </div>`;
  });
  acDropdown.innerHTML = html;
  acDropdown.classList.add('show');
}

function selectAutocomplete(index) {
  if (acSuggestions[index]) {
    queryInput.value = acSuggestions[index].question;
    hideAutocomplete();
    sendQuery();
  }
}

queryInput.addEventListener('input', () => {
  clearTimeout(acDebounceTimer);
  const q = queryInput.value.trim();
  if (!q) { hideAutocomplete(); return; }
  acDebounceTimer = setTimeout(async () => {
    try {
      const res = await fetch('/api/autocomplete?q=' + encodeURIComponent(q));
      const data = await res.json();
      acSuggestions = data.suggestions || [];
      if (queryInput.value.trim() === q) {
        showAutocomplete(acSuggestions);
      }
    } catch (e) { hideAutocomplete(); }
  }, 300);
});

queryInput.addEventListener('keydown', (e) => {
  if (!acDropdown.classList.contains('show')) return;
  const items = acDropdown.querySelectorAll('.ac-item');
  if (items.length === 0) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acActiveIndex = Math.min(acActiveIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acActiveIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acActiveIndex = Math.max(acActiveIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === acActiveIndex));
  } else if (e.key === 'Enter' && acActiveIndex >= 0) {
    e.preventDefault();
    e.stopImmediatePropagation();
    selectAutocomplete(acActiveIndex);
  } else if (e.key === 'Escape') {
    hideAutocomplete();
  }
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.autocomplete-wrapper')) { hideAutocomplete(); }
});

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendFeedback(queryId, rating, btn) {
  const area = btn.parentElement;
  area.querySelectorAll('.feedback-btn').forEach(b => { b.disabled = true; });
  btn.classList.add('selected');
  try {
    await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query_id: queryId, rating: rating }),
    });
  } catch (e) { /* 무시 */ }
  area.innerHTML = '<div class="feedback-thanks">감사합니다</div>';
}

queryInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});

/* --- 대화 내보내기 --- */
let currentSessionId = null;

function toggleExportDropdown() {
  const dd = document.getElementById('exportDropdown');
  const btn = document.getElementById('exportBtn');
  dd.classList.toggle('show');
  const isOpen = dd.classList.contains('show');
  btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  if (isOpen) {
    // Focus first menu item for keyboard users
    const firstItem = dd.querySelector('button');
    if (firstItem) firstItem.focus();
  }
}

// 드롭다운 외부 클릭 시 닫기
document.addEventListener('click', (e) => {
  const wrapper = document.querySelector('.export-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('exportDropdown').classList.remove('show');
  }
});

function gatherMessagesFromDOM() {
  const msgs = [];
  const msgEls = document.querySelectorAll('.msg');
  msgEls.forEach(el => {
    const role = el.classList.contains('user') ? 'user' : 'bot';
    // Get the first child div/element text for the message content
    const contentEl = el.querySelector('.section-content, [style]');
    let message = '';
    if (contentEl) {
      message = contentEl.textContent.trim();
    } else {
      // Fallback: get all text before the meta line
      const clone = el.cloneNode(true);
      const meta = clone.querySelector('.meta');
      if (meta) meta.remove();
      const fb = clone.querySelector('.feedback-area');
      if (fb) fb.remove();
      const fbThanks = clone.querySelector('.feedback-thanks');
      if (fbThanks) fbThanks.remove();
      const badge = clone.querySelector('.escalation-badge');
      if (badge) badge.remove();
      message = clone.textContent.trim();
    }
    const metaEl = el.querySelector('.meta');
    const timestamp = metaEl ? metaEl.textContent.trim() : '';
    msgs.push({ role, message, timestamp });
  });
  return msgs;
}

function generateClientExport(format, messages) {
  const dateStr = new Date().toLocaleString('ko-KR');
  if (format === 'text') {
    const lines = ['보세전시장 챗봇 대화 기록', '날짜: ' + dateStr, '---'];
    messages.forEach(m => {
      const label = m.role === 'user' ? '[사용자]' : '[챗봇]';
      lines.push(label + ' ' + m.message);
    });
    lines.push('---', '총 ' + messages.length + '개 대화');
    return lines.join('\n');
  }
  if (format === 'json') {
    return JSON.stringify({
      export_date: dateStr,
      messages_count: messages.length,
      messages: messages
    }, null, 2);
  }
  if (format === 'csv') {
    const rows = [['role', 'message', 'timestamp'].join(',')];
    messages.forEach(m => {
      const escaped = m.message.replace(/"/g, '""');
      rows.push([m.role, '"' + escaped + '"', m.timestamp].join(','));
    });
    return rows.join('\n');
  }
  if (format === 'html') {
    const bubbles = messages.map(m => {
      const cls = m.role === 'user' ? 'user' : 'bot';
      const label = m.role === 'user' ? '사용자' : '챗봇';
      const safe = m.message.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<div class="bubble ' + cls + '"><span class="label">' + label + '</span>' + safe + '</div>';
    }).join('\n');
    return '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>대화 기록</title>' +
      '<style>body{background:#FAFAF7;color:#1F2328;font-family:Pretendard,"Noto Sans KR",system-ui,sans-serif;padding:24px;line-height:1.65;font-size:16px}' +
      '.bubble{padding:14px 18px;margin:10px 0;border-radius:14px;max-width:72ch;line-height:1.7;border:1px solid #E5E7EB;box-shadow:0 1px 2px rgba(31,35,40,0.06)}' +
      '.bubble .label{display:block;font-size:11px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;margin-bottom:6px;opacity:.7}' +
      '.bubble.user{background:#0969DA;color:#fff;margin-left:auto;border-bottom-right-radius:4px;border-color:transparent}' +
      '.bubble.bot{background:#fff;margin-right:auto;border-bottom-left-radius:4px}' +
      '@media(prefers-color-scheme:dark){body{background:#0D1117;color:#E6EDF3}.bubble{border-color:#21262D;box-shadow:0 1px 2px rgba(0,0,0,0.20)}.bubble.bot{background:#161B22}.bubble.user{background:#1F6FEB}}' +
      '</style></head><body><div style="max-width:760px;margin:0 auto">' +
      '<h1 style="text-align:center;font-size:1.3em;font-weight:600;margin-bottom:6px">보세전시장 챗봇 대화 기록</h1>' +
      '<p style="text-align:center;color:#57606A;font-size:13px;margin-bottom:20px">날짜: ' + dateStr + '</p>' +
      bubbles +
      '<p style="text-align:center;color:#57606A;font-size:12px;border-top:1px solid #E5E7EB;padding-top:14px;margin-top:24px">총 ' + messages.length + '개 대화</p>' +
      '</div></body></html>';
  }
  return '';
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function exportConversation(format) {
  document.getElementById('exportDropdown').classList.remove('show');

  const extMap = { text: 'txt', json: 'json', csv: 'csv', html: 'html' };
  const mimeMap = { text: 'text/plain', json: 'application/json', csv: 'text/csv', html: 'text/html' };
  const filename = 'conversation_export.' + extMap[format];

  // Try server-side export if we have a session_id
  if (currentSessionId) {
    try {
      const res = await fetch('/api/export', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: currentSessionId, format: format }),
      });
      if (res.ok) {
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        return;
      }
    } catch (e) {
      // Fall through to client-side export
    }
  }

  // Client-side fallback
  const messages = gatherMessagesFromDOM();
  if (messages.length === 0) {
    return;
  }
  const content = generateClientExport(format, messages);
  downloadFile(content, filename, mimeMap[format]);
}

/* --- 테마 토글 (수동 라이트/다크/자동) ---
   stored: "light" | "dark" | null(=auto, OS 환경 따라감) */
function applyTheme(mode) {
  document.body.classList.remove('light','force-dark');
  if (mode === 'light') document.body.classList.add('light');
  else if (mode === 'dark') document.body.classList.add('force-dark');
  const tt = document.getElementById('themeToggle');
  if (tt) tt.innerHTML = (mode === 'light') ? '&#x2600;' : '&#x263E;';
}
function toggleTheme() {
  // 토글 사이클: auto → light → dark → auto
  const cur = localStorage.getItem('chatbot-theme'); // null|light|dark
  const next = (cur === null || cur === 'auto') ? 'light' : (cur === 'light' ? 'dark' : 'auto');
  if (next === 'auto') localStorage.removeItem('chatbot-theme');
  else localStorage.setItem('chatbot-theme', next);
  applyTheme(next);
}
(function initTheme() {
  const stored = localStorage.getItem('chatbot-theme');
  applyTheme(stored || 'auto');
})();

/* --- 모바일 사이드바 --- */
function toggleMobileSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const hamburger = document.getElementById('hamburgerBtn');
  sidebar.classList.toggle('mobile-open');
  overlay.classList.toggle('show');
  const isOpen = sidebar.classList.contains('mobile-open');
  hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  hamburger.setAttribute('aria-label', isOpen ? '사이드바 메뉴 닫기' : '사이드바 메뉴 열기');
}

/* --- 타이핑 이펙트 --- */
function typeEffect(element, html, callback) {
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const text = temp.textContent;
  element.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  element.appendChild(cursor);
  let i = 0;
  const speed = 15;
  function typeNext() {
    if (i < text.length) {
      cursor.before(document.createTextNode(text.charAt(i)));
      i++;
      setTimeout(typeNext, speed);
    } else {
      cursor.remove();
      element.innerHTML = html;
      if (callback) callback();
    }
  }
  typeNext();
}

/* --- Keyboard shortcut: Ctrl+/ to focus input --- */
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === '/') {
    e.preventDefault();
    queryInput.focus();
  }
  // Escape closes export dropdown
  if (e.key === 'Escape') {
    const dd = document.getElementById('exportDropdown');
    if (dd.classList.contains('show')) {
      dd.classList.remove('show');
      document.getElementById('exportBtn').setAttribute('aria-expanded', 'false');
      document.getElementById('exportBtn').focus();
    }
  }
});

/* --- Export dropdown keyboard navigation --- */
document.getElementById('exportDropdown').addEventListener('keydown', (e) => {
  const items = Array.from(e.currentTarget.querySelectorAll('button'));
  const currentIndex = items.indexOf(document.activeElement);
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    const next = currentIndex < items.length - 1 ? currentIndex + 1 : 0;
    items[next].focus();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = currentIndex > 0 ? currentIndex - 1 : items.length - 1;
    items[prev].focus();
  } else if (e.key === 'Tab') {
    document.getElementById('exportDropdown').classList.remove('show');
    document.getElementById('exportBtn').setAttribute('aria-expanded', 'false');
  }
});

/* --- Update aria-expanded on export dropdown close via outside click --- */
const origExportClickHandler = document.addEventListener('click', () => {});
// Patched in existing click handler above - also update aria-expanded
(function patchExportDropdownAriaOnOutsideClick() {
  const dd = document.getElementById('exportDropdown');
  const btn = document.getElementById('exportBtn');
  const observer = new MutationObserver(() => {
    const isOpen = dd.classList.contains('show');
    btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });
  observer.observe(dd, { attributes: true, attributeFilter: ['class'] });
})();

init();
