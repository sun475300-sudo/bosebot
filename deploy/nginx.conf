# 보세전시장 챗봇 Nginx 리버스 프록시 설정 (프로덕션용)
# 사용법: sudo cp deploy/nginx.conf /etc/nginx/sites-available/chatbot
#         sudo ln -s /etc/nginx/sites-available/chatbot /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

# Rate limiting 설정
# - 일반 API: 10 requests/sec per IP
# - Chat API: 5 requests/sec per IP (더 엄격함)
limit_req_zone $binary_remote_addr zone=chatbot_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=chatbot_chat_limit:10m rate=5r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=chatbot_conn:10m;

upstream gunicorn {
    server 127.0.0.1:8080;
    keepalive 32;
    keepalive_timeout 60s;
}

server {
    listen 80;
    server_name _;

    # --- SSL/TLS 설정 (certbot으로 활성화) ---
    # 프로덕션 배포 시 다음 단계로 SSL 활성화:
    # 1) certbot certonly --nginx -d your-domain.com
    # 2) 아래 주석을 해제하고 listen 80 블록을 redirect로 변경
    #
    # listen 443 ssl http2;
    # server_name your-domain.com www.your-domain.com;
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_session_tickets off;
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;
    # --- SSL/TLS 설정 끝 ---

    # --- HTTP -> HTTPS 리다이렉트 (SSL 활성화 시 별도 server 블록으로 분리) ---
    # SSL 활성화 후 main server 블록 아래에 추가:
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name your-domain.com www.your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
    # --- 리다이렉트 끝 ---

    # 보안 헤더 (프로덕션 필수)
    # Clickjacking 방지
    add_header X-Frame-Options "SAMEORIGIN" always;

    # MIME-type 스니핑 방지
    add_header X-Content-Type-Options "nosniff" always;

    # XSS 공격 방지 (최신 브라우저)
    add_header X-XSS-Protection "1; mode=block" always;

    # 콘텐츠 보안 정책 (CSP)
    # 프로덕션: 'unsafe-inline' 제거 후 인라인 스크립트는 nonce로 관리
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

    # Referrer 정책
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 기능 권한 정책 (Permissions Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # HSTS (Strict-Transport-Security) - SSL 활성화 후 주석 해제
    # 첫 배포: max-age=3600 (1시간)으로 시작, 검증 후 max-age=63072000 (2년)으로 증가
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # 정적 파일 캐싱 (web/ 디렉토리)
    location /static/ {
        alias /app/web/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 파비콘, 매니페스트, 서비스워커
    location ~* ^/(manifest\.json|sw\.js|favicon\.ico)$ {
        proxy_pass http://gunicorn;
        expires 1d;
    }

    # API 엔드포인트 - rate limiting 및 보안 설정
    location /api/ {
        # Rate limiting
        limit_req zone=chatbot_limit burst=20 nodelay;
        limit_req_status 429;

        # Connection limiting
        limit_conn chatbot_conn 10;

        # 요청 본문 크기 제한 (1MB)
        client_max_body_size 1M;

        # 프록시 설정
        proxy_pass http://gunicorn;

        # 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Connection 관리
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 타임아웃 설정
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # 버퍼링 설정
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 채팅 API - 더 엄격한 rate limiting
    location /api/chat {
        # 더 엄격한 rate limiting
        limit_req zone=chatbot_chat_limit burst=10 nodelay;
        limit_req_status 429;

        limit_conn chatbot_conn 10;
        client_max_body_size 1M;

        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 스트리밍 응답 버퍼링 비활성화
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 10s;
    }

    # 기본 프록시 (웹 UI 등)
    location / {
        # 요청 본문 크기 제한
        client_max_body_size 1M;

        proxy_pass http://gunicorn;

        # 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Connection 관리
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 타임아웃 설정
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # 로그 설정
    # 접근 로그: 상세 포맷으로 보안 모니터링 용이
    log_format chatbot_log '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          '"$http_x_forwarded_for" rt=$request_time '
                          'uct="$upstream_connect_time" '
                          'uht="$upstream_header_time" '
                          'urt="$upstream_response_time"';

    access_log /var/log/nginx/chatbot_access.log chatbot_log buffer=32k;
    error_log /var/log/nginx/chatbot_error.log warn;

    # 로그 로테이션 설정 (logrotate 사용)
    # /etc/logrotate.d/nginx에 다음 추가:
    # /var/log/nginx/chatbot_*.log {
    #     daily
    #     rotate 14
    #     compress
    #     delaycompress
    #     notifempty
    #     create 0640 www-data adm
    #     sharedscripts
    #     prerotate
    #         if [ -d /etc/logrotate.d/httpd-prerotate.d ]; then \
    #             run-parts /etc/logrotate.d/httpd-prerotate.d; \
    #         fi
    #     endscript
    #     postrotate
    #         if [ -f /var/run/nginx.pid ]; then \
    #             kill -USR1 $(cat /var/run/nginx.pid); \
    #         fi
    #     endscript
    # }
}
