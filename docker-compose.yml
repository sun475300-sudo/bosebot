# =====================================================================
# Bonded Exhibition Chatbot - Docker Compose (full stack: chatbot + redis + nginx)
# Quickstart:
#   cp .env.example .env   # then fill in secrets
#   docker compose up -d
#   open http://localhost:8080
#
# For minimum-footprint local runs (just the chatbot, no redis/nginx),
# see docker-compose.dev.yml.
# =====================================================================

services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: bonded-exhibition-chatbot:latest
    container_name: bonded-chatbot
    restart: unless-stopped
    ports:
      - "${CHATBOT_HOST_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      CHATBOT_PORT: "8080"
      CHATBOT_HOST: "0.0.0.0"
      CHATBOT_DB_PATH: "logs/chat_logs.db"
      REDIS_URL: "redis://redis:6379/0"
      HF_HOME: "/app/.hf-cache"
    volumes:
      - chatbot-logs:/app/logs
      - chatbot-data:/app/data
      - chatbot-backups:/app/backups
      - hf-cache:/app/.hf-cache
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chatbot-net
    healthcheck:
      test: ["CMD", "python", "deploy/healthcheck.py", "--host", "127.0.0.1", "--port", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: bonded-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - chatbot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  nginx:
    image: nginx:1.25-alpine
    container_name: bonded-nginx
    restart: unless-stopped
    profiles: ["proxy"]   # opt-in: `docker compose --profile proxy up -d`
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/app/web:ro
      - nginx-logs:/var/log/nginx
      # SSL certificates (uncomment when using certbot):
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      chatbot:
        condition: service_healthy
    networks:
      - chatbot-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

volumes:
  chatbot-logs:
  chatbot-data:
  chatbot-backups:
  redis-data:
  nginx-logs:
  hf-cache:

networks:
  chatbot-net:
    driver: bridge
