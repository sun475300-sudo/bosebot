# ============================================================
# 보세전시장 챗봇 - 기본 1-라인 실행용 docker-compose
# ============================================================
# 사용법:
#   cp .env.example .env       # 환경변수 채우기
#   docker compose up -d       # 백그라운드 실행
#   docker compose logs -f     # 로그 확인
#   docker compose down        # 종료
#
# nginx 리버스 프록시 + redis 캐시까지 필요한 경우:
#   docker compose -f docker-compose.production.yml up -d
# ============================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: bonded-chatbot:latest
    container_name: bonded-chatbot
    restart: unless-stopped
    ports:
      - "${CHATBOT_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      CHATBOT_PORT: "8080"
      CHATBOT_HOST: "0.0.0.0"
      PYTHONUNBUFFERED: "1"
    volumes:
      - chatbot-logs:/app/logs
      - chatbot-data:/app/data
      - chatbot-backups:/app/backups
      # HuggingFace 모델 캐시 (sentence-transformers 다운로드 1회만)
      - hf-cache:/app/.hf_cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  chatbot-logs:
  chatbot-data:
  chatbot-backups:
  hf-cache:
